<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700&display=swap');
:root {

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #000; background: #fff; line-height: 1.5; }

.pg-editor-label { font-size: 1.6mm; color: rgba(255,255,255,0.45); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 1mm; white-space: nowrap; }

<body>
<div class="container">
    <div class="top-container">
        <h1>FLYER / BROCHURE DESIGNER</h1>
        <div class="left">
            <div class="input-section">
                <label for="pageUrls">PAGES:</label>
                <textarea id="pageUrls" placeholder="Current page list will appear here">https://www.futureautomation.co.uk/Product/Details/AM</textarea>
            </div>
            <div class="input-section">
                <label for="urlInput">PASTE URLS HERE TO GENERATE BROCHURE:</label>
                <textarea id="urlInput" placeholder="PASTE LINKS HERE THEN PRESS 'GENERATE LIST'"></textarea>
            </div>
            <div class="button-container">
                <button type="button" id="createButton" onclick="fetchCdnUrls()"><i class="fas fa-file-pdf"></i> Create Brochure</button>
                <button type="button" onclick="startScraping()"><i class="fas fa-list"></i> Generate List</button>
                <button type="button" onclick="printPage()"><i class="fas fa-download"></i> Export PDF</button>
                <button type="button" onclick="clearAll()"><i class="fas fa-trash"></i> Clear All</button>
            </div>
            <div class="status-container" id="statusContainer" style="display:none;">
                <div class="spinner"></div>
                <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
                <span class="status-text" id="statusText">Ready</span>
            </div>
        </div>
    </div>
</div>

<div id="pagesContainer"></div>
<div id="results" style="display:none;"></div>
<div class="page-navigator" id="pageNavigator" style="display:none;"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
const visitedLinks = new Set();
const processedUrls = new Set();
const corsProxyAPI = 'https://api.codetabs.com/v1/proxy?quest=';
const delayBetweenRequests = 333;
const retryDelay = 2000;
const maxRetries = 3;
const cacheExpirationTime = 30 * 60 * 1000;
const cache = {
    data: {},
    set(k, v) { this.data[k] = { value: v, timestamp: Date.now() }; },
    get(k) {
        const item = this.data[k];
        if (!item) return null;
        if (Date.now() - item.timestamp > cacheExpirationTime) { delete this.data[k]; return null; }
        return item.value;
    },
    clear() { this.data = {}; }
};
const excludeKeywords = ['Login','Account','mailto:','facebook.com','twitter.com','instagram.com','linkedin.com','privacy','terms','cookies','copyright','sitemap','contact-us','about-us','help','faq'];

function showToast(message, type = 'info', duration = 5000) {
    const tc = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', warning:'fa-exclamation-triangle' };
    toast.innerHTML = `<i class="fas ${icons[type]||'fa-info-circle'}"></i><span>${message}</span><div class="toast-progress"><div class="toast-progress-bar"></div></div>`;
    tc.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease-out forwards';
        setTimeout(() => tc.removeChild(toast), 300);
    }, duration);
}

async function fetchWithRetry(url, retries = maxRetries, backoff = retryDelay) {
    const cached = cache.get(url);
    if (cached) return cached;
    for (let i = 0; i < retries; i++) {
        try {
            const proxyUrl = `${corsProxyAPI}${encodeURIComponent(url)}`;
            updateStatus(`Fetching: ${url.split('/').pop()}... (${i+1}/${retries})`);
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const ct = res.headers.get('Content-Type') || '';
            let data;
            if (ct.includes('application/json')) data = await res.json();
            else data = { contents: await res.text() };
            cache.set(url, data);
            return data;
        } catch (err) {
            if (i < retries - 1) { await delay(backoff * Math.pow(2, i)); }
            else { showToast(`Failed to fetch ${url.split('/').pop()}`, 'error'); throw err; }
        }
    }
}

async function fetchHTML(url) {
    try { await delay(delayBetweenRequests); return (await fetchWithRetry(url)).contents; }
    catch { return ''; }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function shouldExclude(href) { return excludeKeywords.some(k => href.includes(k)); }

async function getSublinks(url, baseUrl) {
    const html = await fetchHTML(url);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const sublinks = [];
    const main = doc.querySelector('main') || doc.body;
    main.querySelectorAll('a:not(nav a):not(footer a):not(.MegaMenu a):not(.btn)').forEach(a => {
        const href = a.getAttribute('href');
        if (href && href.startsWith('/') && !href.includes('#') && !visitedLinks.has(href) && !shouldExclude(href)) {
            sublinks.push(new URL(href, baseUrl).href);
            visitedLinks.add(href);
        }
    });
    return sublinks;
}

async function getProductLinks(url) {
    const html = await fetchHTML(url);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const links = new Set();
    const ex = ['/Product/EnclosureParts','/Product/EnclosureSupport','/Product/AudioVisual'];
    doc.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (href && href.startsWith('/Product/') && !ex.some(e => href.includes(e))) {
            if (/^\/Product\/Details\/[A-Z0-9-]+$/.test(href) || /^\/Product\/[A-Za-z]+$/.test(href)) {
                links.add(new URL(href, url).href);
            }
        }
    });
    return Array.from(links);
}

function formatTitle(url) { return url.split('/').pop().replace(/([a-z])([A-Z])/g,'$1 $2').replace(/-/g,' ').toUpperCase(); }

async function scrape(url, parentDiv, baseUrl) {
    if (visitedLinks.has(url)) return;
    visitedLinks.add(url);
    updateStatus(`Scraping: ${url.split('/').pop()}`);
    try {
        const productLinks = await getProductLinks(url);
        if (productLinks.length > 0) {
            const h = document.createElement('div');
            h.textContent = 'CONTENTS - ' + formatTitle(url);
            h.dataset.url = url;
            parentDiv.appendChild(h);
            for (const link of productLinks) {
                const d = document.createElement('div');
                d.textContent = link;
                d.dataset.url = url;
                parentDiv.appendChild(d);
            }
            updatePageURLs();
            return;
        }
        const sublinks = await getSublinks(url, baseUrl);
        for (const sub of sublinks) { await delay(delayBetweenRequests); await scrape(sub, parentDiv, baseUrl); }
    } catch { showToast(`Error scraping ${url.split('/').pop()}`, 'error'); }
}

async function scrapeMultipleWebsites(urls) {
    const resultsDiv = document.getElementById('results');
    document.getElementById('statusContainer').style.display = 'flex';
    resultsDiv.innerHTML = '';
    try {
        removeBackCoverAndBlanks();
        const cover = document.createElement('div');
        cover.textContent = `COVER - ${urls.map(u => formatTitle(u)).join(', ')} GUIDE`;
        resultsDiv.insertBefore(cover, resultsDiv.firstChild);
        let done = 0;
        for (const url of urls) {
            if (!processedUrls.has(url)) {
                updateStatus(`Processing (${done+1}/${urls.length}): ${url.split('/').pop()}`);
                await scrape(url, resultsDiv, new URL(url).origin);
                processedUrls.add(url);
                updateProgress((++done / urls.length) * 100);
            }
        }
        addBackCoverAndBlanks();
        updatePageURLs();
        showToast('List generation complete', 'success');
    } catch { showToast('Error during list generation', 'error'); }
    finally { updateStatus('Done'); hideProgress(); }
}

function removeBackCoverAndBlanks() {
    Array.from(document.getElementById('results').children)
        .filter(d => d.textContent === 'BACK COVER' || d.textContent === 'BLANK')
        .forEach(d => d.remove());
}

function addBackCoverAndBlanks() {
    const r = document.getElementById('results');
    const count = r.querySelectorAll('div').length;
    const total = Math.ceil((count + 1) / 4) * 4;
    const blanks = total - (count + 1);
    for (let i = 0; i < blanks; i++) { const b = document.createElement('div'); b.textContent = 'BLANK'; r.appendChild(b); }
    const bc = document.createElement('div'); bc.textContent = 'BACK COVER'; r.appendChild(bc);
}

function startScraping() {
    visitedLinks.clear(); processedUrls.clear();
    document.getElementById('results').innerHTML = '';
    document.getElementById('pageUrls').value = '';
    const urls = [...new Set(document.getElementById('urlInput').value.split('\n').map(u => u.trim()).filter(Boolean))];
    if (urls.length) scrapeMultipleWebsites(urls);
    else showToast('Please enter one or more URLs', 'warning');
}

function updatePageURLs() {
    document.getElementById('pageUrls').value = Array.from(document.getElementById('results').querySelectorAll('div')).map(d => d.textContent).join('\n');
}

function createCoverPage(text) {
    const page = document.createElement('div');
    page.classList.add('a4-page');
    page.dataset.productName = 'Cover: ' + text;
    page.style.cssText = 'position:relative;overflow:hidden;';
    const bg = document.createElement('div');
    bg.style.cssText = 'position:absolute;top:10mm;left:10mm;width:calc(100% - 20mm);height:calc(100% - 20mm);background:radial-gradient(circle at 20% 20%,#f6f6f6,transparent 100%),radial-gradient(circle at 80% 80%,#f1f1f1,transparent 100%);';
    page.appendChild(bg);
    const bar = document.createElement('div');
    bar.style.cssText = 'position:absolute;left:50%;top:0;transform:translateX(-50%);width:50mm;height:90mm;background:#000;';
    page.appendChild(bar);
    const logo = document.createElement('img');
    logo.src = 'https://s3.eu-west-1.amazonaws.com/cdn.futureautomation.co.uk/Files/Logo+Centered+-+Black.svg';
    logo.style.cssText = 'position:absolute;bottom:10mm;left:50%;transform:translateX(-50%);height:15mm;filter:invert(1);';
    bar.appendChild(logo);
    const title = document.createElement('div');
    title.style.cssText = 'position:absolute;top:60%;left:50%;transform:translate(-50%,-50%);width:calc(100% - 40mm);font-size:60px;color:#000;font-weight:100;text-align:center;word-wrap:break-word;padding:20mm;letter-spacing:0.15rem;';
    title.textContent = text;
    page.appendChild(title);
    const url = document.createElement('div');
    url.style.cssText = 'position:absolute;bottom:20mm;left:50%;transform:translateX(-50%);font-size:12px;color:#000;letter-spacing:0.15rem;';
    url.textContent = 'www.futureautomation.net';
    page.appendChild(url);
    addPageControls(page);
    return page;
}

function createContentsPage(title, urls, sectionStartPages) {
    const page = document.createElement('div');
    page.classList.add('a4-page');
    page.dataset.productName = 'Contents: ' + title;
    page.dataset.pageType = 'contents';
    page.style.cssText = 'position:relative;overflow:hidden;';
    const stripe = el('div', null);
    stripe.style.cssText = 'position:absolute;left:0;top:0;width:28mm;height:100%;background:#000;';
    const stripeLabel = el('div', null, 'CONTENTS');
    stripeLabel.style.cssText = 'position:absolute;bottom:18mm;left:0;width:28mm;text-align:center;color:rgba(255,255,255,0.18);font-family:Open Sans,sans-serif;font-size:2mm;letter-spacing:0.3em;font-weight:400;writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;transform-origin:center center;left:50%;transform:translateX(-50%) rotate(180deg);';
    const logoWrap = el('div', null);
    logoWrap.style.cssText = 'position:absolute;top:10mm;left:0;width:28mm;display:flex;justify-content:center;';
    const logo = el('img', null);
    logo.src = 'https://s3.eu-west-1.amazonaws.com/cdn.futureautomation.co.uk/Files/Logo+Centered+-+Black.svg';
    logo.style.cssText = 'height:7mm;filter:invert(1);';
    logoWrap.appendChild(logo);
    stripe.appendChild(stripeLabel);
    stripe.appendChild(logoWrap);
    page.appendChild(stripe);
    const content = el('div', null);

function classifyImages(carouselImgs, productCode) {
    const code = productCode.toLowerCase();
    const lifestyle = [], product = [];
    const seen = new Set();
    carouselImgs.forEach(img => {
        const src = img.src || '';
        if (!src || seen.has(src)) return;
        seen.add(src);
        const srcLower = src.toLowerCase();
        const filename = src.split('/').pop().split('?')[0].toLowerCase();
        if (srcLower.includes('/product/video/')) { return; }
        else if (srcLower.includes('/product/gallery/')) { lifestyle.push(src); }
        else if (srcLower.includes('/product/main/') && filename.startsWith(code)) { product.push(src); }
        else if (filename.startsWith(code)) { product.push(src); }
        else { lifestyle.push(src); }
    });
    return { lifestyle, product };
}

function makeSlot(imgArray, initialIdx, totalSlots, type) {
    const wrap = el('div', 'position:relative;overflow:hidden;min-height:0;display:flex;align-items:center;justify-content:center;');
    const isProduct = type === 'product';
    wrap.className = isProduct ? 'pg-img' : 'fa-lifestyle';

    if (!isProduct) {
        wrap.style.cssText += 'background:#0a0a0a;border-radius:2mm;border:0.2mm solid #e8e8e8; aspect-ratio: 16/9; width: 100%; flex-shrink: 0;';
    }

    const img = el('img', !isProduct ? 'width:100%;height:100%;object-fit:cover;display:block;' : 'max-width:100%;max-height:100%;object-fit:contain;display:block;');
    let currentIdx = initialIdx;
    img.src = imgArray[currentIdx];
    wrap.appendChild(img);

    if (imgArray.length > totalSlots) {
        const nav = el('div', null);
        nav.style.cssText = 'position:absolute;display:flex;gap:1.5mm;align-items:center;z-index:2;' + (isProduct ? 'top:2mm;right:2mm;' : 'bottom:2mm;right:2mm;');

        const cnt = el('span', null, `${currentIdx + 1}/${imgArray.length}`);
        cnt.style.cssText = 'color:#fff;background:rgba(0,0,0,0.75);padding:0 1.5mm;border-radius:1mm;height:5mm;display:flex;align-items:center;font-size:1.8mm;letter-spacing:0.05em;font-family:Open Sans,sans-serif;margin:0;border:1px solid rgba(255,255,255,0.4);box-shadow:0 2px 5px rgba(0,0,0,0.5); backdrop-filter: blur(2px);';

        const btnCss = 'background:rgba(0,0,0,0.75);color:#fff;border:1px solid rgba(255,255,255,0.4);border-radius:1mm;width:5mm;height:5mm;font-size:2mm;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,0.5); backdrop-filter: blur(2px);';

        const prev = el('button', null, '◀');
        const next = el('button', null, '▶');
        prev.style.cssText = btnCss; next.style.cssText = btnCss;

        prev.onclick = () => {
            currentIdx = (currentIdx - totalSlots + imgArray.length) % imgArray.length;
            img.src = imgArray[currentIdx];
            cnt.textContent = `${currentIdx + 1}/${imgArray.length}`;
        };
        next.onclick = () => {
            currentIdx = (currentIdx + totalSlots) % imgArray.length;
            img.src = imgArray[currentIdx];
            cnt.textContent = `${currentIdx + 1}/${imgArray.length}`;
        };

        nav.appendChild(prev); nav.appendChild(cnt); nav.appendChild(next);
        wrap.appendChild(nav);
    }
    return wrap;
}

function buildLayout(inner, productCode, subtitle, descHTML, productImgs, specTable, tags, lifestyleImgs) {
    const layoutContainer = el('div', 'display: grid; gap: 4mm; height: 100%; width: 100%; min-height: 0;');
    inner.appendChild(layoutContainer);

    const hdr = makeHeader(productCode, subtitle, tags);
    hdr.style.gridArea = 'hd';
    layoutContainer.appendChild(hdr);

    const imgCol = el('div', 'grid-area: im; display: flex; flex-direction: column; gap: 4mm; overflow: hidden; min-height: 0;');
    layoutContainer.appendChild(imgCol);

    const textCol = el('div', 'grid-area: tx; display: flex; flex-direction: column; overflow: hidden; min-height: 0;');
    const nameBox = el('div', null);
    nameBox.className = 'fa-namebox';
    nameBox.innerHTML = `<div class="fa-pname">${productCode}</div>${subtitle ? `<div class="fa-psub">${subtitle}</div>` : ''}`;
    textCol.appendChild(nameBox);
    const desc = el('div', null, descHTML);
    desc.className = 'fa-desc';
    textCol.appendChild(desc);
    layoutContainer.appendChild(textCol);

    const lsCol = el('div', 'grid-area: ls; display: flex; flex-direction: column; gap: 2mm; overflow: hidden; min-height: 0;');
    layoutContainer.appendChild(lsCol);

    const specCol = el('div', 'grid-area: sp; overflow: hidden; display: flex; flex-direction: column; min-height: 0; flex-shrink: 0;');
    if(specTable) {
        specCol.appendChild(makeSpecZone(specTable));
    }
    layoutContainer.appendChild(specCol);

    let state = {
        lsVisible: lifestyleImgs ? Math.min(lifestyleImgs.length, 3) : 0,
        imgVisible: productImgs ? Math.min(productImgs.length, 4) : 0,
        hasSpec: !!specTable
    };

    function renderGrid() {
        imgCol.innerHTML = '';
        lsCol.innerHTML = '';
        
        imgCol.style.justifyContent = 'flex-start';
        textCol.style.justifyContent = 'flex-start';

        if(state.imgVisible > 0) {
            const isGrid = (state.imgVisible === 4 || state.imgVisible === 2) && state.lsVisible === 0;
            imgCol.style.display = isGrid ? 'grid' : 'flex';
            if (isGrid) {
                imgCol.style.gridTemplateColumns = '1fr 1fr';
                imgCol.style.gridTemplateRows = state.imgVisible === 4 ? '1fr 1fr' : '1fr';
            } else {
                imgCol.style.gridTemplateColumns = '';
                imgCol.style.gridTemplateRows = '';
            }

            for (let i = 0; i < state.imgVisible; i++) {
                if (i < productImgs.length) {
                    const z = makeSlot(productImgs, i, state.imgVisible, 'product');
                    if (!isGrid) {
                         z.style.flex = '1';
                         if (i > 0) z.style.borderTop = '0.2mm solid #e8e8e8';
                         if (i > 0) z.style.paddingTop = '2mm';
                    } else {
                         z.style.borderTop = 'none';
                         z.style.paddingTop = '0';
                    }
                    imgCol.appendChild(z);
                }
            }
        } else { 
            imgCol.style.display = 'none'; 
        }

        let isBannerLS = (state.imgVisible === 1 && state.lsVisible === 3 && !state.hasSpec) || (state.imgVisible === 1 && state.lsVisible === 1);

        if(state.lsVisible > 0) {
            lsCol.style.display = 'flex';
            
            if(state.lsVisible === 1 || state.lsVisible === 2) {
                lsCol.style.flexDirection = 'column'; 
                if (isBannerLS) lsCol.style.flexDirection = 'row';
                
                for (let i = 0; i < state.lsVisible; i++) {
                    if (i < lifestyleImgs.length) {
                        const z = makeSlot(lifestyleImgs, i, state.lsVisible, 'lifestyle');
                        z.style.flex = '1';
                        lsCol.appendChild(z);
                    }
                }
            } else {
                lsCol.style.flexDirection = (state.imgVisible === 0 || isBannerLS) ? 'row' : 'column';
                const z1 = makeSlot(lifestyleImgs, 0, state.lsVisible, 'lifestyle');
                z1.style.flex = '2';
                lsCol.appendChild(z1);

                const sub = el('div', 'display:flex;gap:2mm;flex-shrink:0;flex:1;min-height:0;');
                sub.style.flexDirection = (state.imgVisible === 0 || isBannerLS) ? 'column' : 'row';

                for(let n=1; n<3; n++) {
                    if (n < lifestyleImgs.length) {
                        const z = makeSlot(lifestyleImgs, n, state.lsVisible, 'lifestyle');
                        z.style.flex = '1';
                        sub.appendChild(z);
                    }
                }
                lsCol.appendChild(sub);
            }
        } else { 
            lsCol.style.display = 'none'; 
        }

        specCol.style.display = state.hasSpec ? 'flex' : 'none';

        let gridCols = '1fr';
        let gridAreas = '';
        let gridRows = '';

        if (state.imgVisible === 0) {
            gridCols = '1fr';
            if (state.lsVisible === 0) {
                gridAreas = state.hasSpec ? '"hd" "tx" "sp"' : '"hd" "tx"';
                gridRows = state.hasSpec ? 'auto 1fr auto' : 'auto 1fr';
            } else {
                gridAreas = state.hasSpec ? '"hd" "ls" "tx" "sp"' : '"hd" "ls" "tx"';
                gridRows = state.hasSpec ? 'auto auto 1fr auto' : 'auto auto 1fr';
            }
        }
        else if (state.imgVisible === 1) {
            if (state.lsVisible === 0) {
                gridCols = '1fr';
                gridAreas = state.hasSpec ? '"hd" "im" "tx" "sp"' : '"hd" "im" "tx" "."';
                gridRows = state.hasSpec ? 'auto fit-content(45%) 1fr auto' : 'auto fit-content(45%) 1fr 12%';
            } else if (state.lsVisible === 1) {
                gridCols = '40% 1fr';
                gridAreas = state.hasSpec ? '"hd hd" "ls ls" "im tx" "sp sp"' : '"hd hd" "ls ls" "im tx"';
                gridRows = state.hasSpec ? 'auto auto 1fr auto' : 'auto auto 1fr';
                
                imgCol.style.justifyContent = 'flex-start';
                textCol.style.justifyContent = 'flex-start';
                if (imgCol.firstElementChild) imgCol.firstElementChild.style.alignItems = 'flex-start';

            } else if (state.lsVisible === 3 && !state.hasSpec) {
                gridCols = '40% 1fr';
                gridAreas = '"hd hd" "ls ls" "im tx"';
                gridRows = 'auto auto 1fr';
                imgCol.style.justifyContent = 'flex-start';
                textCol.style.justifyContent = 'flex-start';
            } else {
                gridCols = '40% 1fr';
                gridAreas = state.hasSpec ? '"hd hd" "im ls" "tx tx" "sp sp"' : '"hd hd" "im ls" "tx tx"';
                gridRows = state.hasSpec ? 'auto 1fr fit-content(35%) auto' : 'auto 1fr fit-content(45%)';
            }
        }
        else if (state.imgVisible === 2 && state.lsVisible === 0) {
            gridCols = '1fr';
            gridAreas = state.hasSpec ? '"hd" "im" "tx" "sp"' : '"hd" "im" "tx"';
            gridRows = state.hasSpec ? 'auto fit-content(40%) 1fr auto' : 'auto fit-content(40%) 1fr';
        }
        else if (state.imgVisible === 3 && state.lsVisible === 0 && state.hasSpec) {
            gridCols = '38% 1fr';
            gridAreas = '"hd hd" "im tx" "im sp" "im ."';
            gridRows = 'auto max-content max-content 1fr';
        }
        else if (state.imgVisible === 4 && state.lsVisible === 0) {
            gridCols = '1fr';
            gridAreas = state.hasSpec ? '"hd" "im" "tx" "sp"' : '"hd" "im" "tx"';
            gridRows = state.hasSpec ? 'auto fit-content(45%) 1fr auto' : 'auto fit-content(45%) 1fr';
        }
        else {
            gridCols = '38% 1fr';
            if (state.lsVisible === 0) {
                gridAreas = state.hasSpec ? '"hd hd" "im tx" "sp sp"' : '"hd hd" "im tx"';
                gridRows = state.hasSpec ? 'auto 1fr auto' : 'auto 1fr';
            } else {
                if (!state.hasSpec && state.imgVisible === 2) {
                    gridAreas = '"hd hd" "im tx" "im ls" "im ."';
                    gridRows = 'auto max-content max-content 1fr';
                } else {
                    gridAreas = state.hasSpec ? '"hd hd" "im tx" "im ls" "sp sp"' : '"hd hd" "im tx" "im ls"';
                    gridRows = state.hasSpec ? 'auto fit-content(35%) 1fr auto' : 'auto fit-content(45%) 1fr';
                }
            }
        }

        layoutContainer.style.gridTemplateColumns = gridCols;
        layoutContainer.style.gridTemplateRows = gridRows;
        layoutContainer.style.gridTemplateAreas = gridAreas;

        if (state.imgVisible === 0 && state.lsVisible === 2 && state.hasSpec) {
            if (textCol.scrollHeight > textCol.clientHeight + 5 || layoutContainer.scrollHeight > layoutContainer.clientHeight + 5) {
                lsCol.style.flexDirection = 'row';
                layoutContainer.style.gridTemplateRows = 'auto min-content 1fr auto'; 
            }
        }

        if (state.imgVisible === 1 && state.lsVisible === 0) {
            imgCol.style.alignItems = 'center';
            if (imgCol.firstElementChild) imgCol.firstElementChild.style.width = '60%';
        }
    }

    const editor = el('div', null);
    editor.className = 'pg-editor';

    if (lifestyleImgs && lifestyleImgs.length > 0) {
        const maxL = Math.min(lifestyleImgs.length, 3);
        const lsSec = el('div', null);
        lsSec.className = 'pg-editor-section';
        lsSec.appendChild(el('span', 'font-size:1.6mm;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;margin-right:1mm;', 'Lifestyle'));
        for(let i = 0; i <= maxL; i++) {
            const btn = el('button', null, String(i));
            btn.className = 'pg-ed-btn' + (i === state.lsVisible ? ' active' : '');
            btn.onclick = () => {
                state.lsVisible = i;
                lsSec.querySelectorAll('.pg-ed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGrid();
            };
            lsSec.appendChild(btn);
        }
        editor.appendChild(lsSec);
    }

    if (productImgs && productImgs.length > 0) {
        const maxI = Math.min(productImgs.length, 4);
        const imgSec = el('div', null);
        imgSec.className = 'pg-editor-section';
        imgSec.appendChild(el('span', 'font-size:1.6mm;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;margin-right:1mm;', 'Images'));
        for(let i = 0; i <= maxI; i++) {
            const btn = el('button', null, String(i));
            btn.className = 'pg-ed-btn' + (i === state.imgVisible ? ' active' : '');
            btn.onclick = () => {
                state.imgVisible = i;
                imgSec.querySelectorAll('.pg-ed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGrid();
            };
            imgSec.appendChild(btn);
        }
        editor.appendChild(imgSec);
    }

    const delSection = el('div', null);
    delSection.className = 'pg-editor-section';
    const delBtn = el('button', null, '✕ Delete page');
    delBtn.className = 'pg-ed-btn del';
    delBtn.onclick = () => { if (confirm('Delete this page?')) { inner.closest('.a4-page').remove(); updatePageNavigator(); } };
    delSection.appendChild(delBtn);
    editor.appendChild(delSection);

    inner.appendChild(editor);
    renderGrid();
}

function processPageContent(doc, pageUrl) {
    const productNameEl = doc.querySelector('#PageProductID');
    const h2El = doc.querySelector('h2');
    const productCode = productNameEl ? productNameEl.textContent.trim() : pageUrl.split('/').pop();
    const subtitle = h2El ? h2El.textContent.trim() : '';

    const descEl = doc.querySelector('.mt-1.mb-5.pb-5');
    if (descEl) cleanDescription(descEl);
    const descHTML = descEl ? descEl.innerHTML : '';

    const carouselImages = doc.querySelectorAll('.owl-carousel img');
    const allImages = Array.from(doc.querySelectorAll('img'));
    const mainImage = allImages.find(img => img.src.includes(pageUrl.split('/').pop())) || allImages.find(img => img.src.includes('QA2-1.png'));

    const carouselImgs = Array.from(carouselImages);
    let { lifestyle, product } = classifyImages(carouselImgs, productCode);

    if (product.length === 0 && mainImage) product.push(mainImage.src);

    const tags = Array.from(doc.querySelectorAll('.row .Tag')).map(t => (t.title || t.textContent).trim()).filter(Boolean);

    let specTable = null;
    const specHeading = Array.from(doc.querySelectorAll('h2')).find(h => h.textContent.includes('TECHNICAL SPECIFICATION'));
    if (specHeading && specHeading.nextElementSibling) {
        const tbl = specHeading.nextElementSibling.querySelector('table');
        if (tbl) {
            cleanTechnicalSpecificationTable(tbl);
            const rows = Array.from(tbl.querySelectorAll('tr'));
            let currentHeaderRow = null;
            let allTBC = true;
            rows.forEach(row => {
                const cells = Array.from(row.cells).map(c => c.textContent.trim());
                const isShipping = cells.some(c => c.toUpperCase().includes('SHIPPING'));
                const isDownloads = cells.some(c => c.toUpperCase().includes('DOWNLOADS'));
                if (isShipping || isDownloads) { row.remove(); return; }
                if (cells.some(c => c === 'TBC' || c === 'VARIABLE' || /https?:\/\//.test(c)) || row.querySelector('a')) {
                    row.remove();
                } else {
                    if (currentHeaderRow && allTBC) currentHeaderRow.remove();
                    currentHeaderRow = row;
                    allTBC = true;
                    if (!cells.some(c => c === 'TBC' || c === 'VARIABLE')) allTBC = false;
                }
            });
            const nonEmpty = Array.from(tbl.querySelectorAll('tr')).filter(r => Array.from(r.cells).some(c => c.textContent.trim()));
            if (nonEmpty.length > 1) specTable = tbl;
        }
    }

    const page = document.createElement('div');
    page.classList.add('a4-page');
    page.dataset.productName = productCode;
    const inner = el('div', null);
    inner.className = 'fa-inner';
    page.appendChild(inner);

    buildLayout(inner, productCode, subtitle, descHTML, product, specTable, tags, lifestyle);
    document.getElementById('pagesContainer').appendChild(page);
}

function cleanDescription(desc) {
    desc.querySelectorAll('table,button').forEach(e => e.remove());
    desc.querySelectorAll('img,video,iframe').forEach(e => { if (e.parentElement) e.parentElement.remove(); else e.remove(); });
    desc.querySelectorAll('.row, .alert, .LidTypes, .clearfix').forEach(e => e.remove());
    desc.querySelectorAll('a').forEach(a => { if (!/^\/Product\/Details\/[A-Za-z0-9\-]+$/.test(a.getAttribute('href'))) a.remove(); });
    const parser = new DOMParser();
    const d = parser.parseFromString(desc.innerHTML, 'text/html');
    d.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href') || '';
        const txt = a.textContent.trim();
        if (/^\/Product\/Details\/[A-Za-z0-9\-]+$/.test(href) && /^[A-Za-z0-9\-]+$/.test(txt)) a.replaceWith(document.createTextNode(txt));
        else a.remove();
    });
    desc.innerHTML = d.body.innerHTML.split('. ').filter(s => !(s.includes('see') && s.includes('for details'))).join('. ');
}

function cleanTechnicalSpecificationTable(table) {
    Array.from(table.querySelectorAll('tr')).forEach(row => {
        if (row.querySelectorAll('button').length) { row.remove(); return; }
        row.querySelectorAll('img').forEach(img => { img.querySelectorAll && row.querySelectorAll('strong').forEach(s => s.remove()); img.remove(); });
        if (Array.from(row.cells).some(c => c.textContent.trim() === '')) row.remove();
    });
}

async function fetchPage(url) {
    const data = await fetchWithRetry(url);
    const html = (typeof data === 'object' && data.contents) ? data.contents : data;
    processPageContent(new DOMParser().parseFromString(html, 'text/html'), url);
}

function createMasterContentsPages(sections, pageOrder) {
    const pages = [];
    const flatItems = [];
    sections.forEach(sec => {
        flatItems.push({ isSectionHeader: true, title: sec.title, startPageNum: sec.startPageNum });
        sec.urls.forEach((u, ui) => {
            let pgNum = null; let count = 0;
            for (const item of pageOrder) {
                if (item.type === 'url' && item.section === sec.title) {
                    if (count === ui) { pgNum = item._pageNum; break; }
                    count++;
                }
            }
            flatItems.push({ 
                isSectionHeader: false, 
                name: u.split('/').pop().replace(/([a-z])([A-Z])/g, '$1 $2').replace(/-/g, ' ').toUpperCase(), 
                pageNum: pgNum 
            });
        });
    });

    const MAX_ITEMS_PER_PAGE = 144; 
    
    for (let pageIdx = 0; pageIdx < flatItems.length; pageIdx += MAX_ITEMS_PER_PAGE) {
        const pageItems = flatItems.slice(pageIdx, pageIdx + MAX_ITEMS_PER_PAGE);
        
        const page = document.createElement('div');
        page.classList.add('a4-page');
        page.dataset.productName = 'Contents';
        if (pageIdx > 0) page.dataset.productName += ` (Part ${Math.floor(pageIdx/MAX_ITEMS_PER_PAGE) + 1})`;

        const inner = el('div', null);
        inner.style.cssText = 'position:absolute;inset:12mm;display:flex;flex-direction:column;font-family:Open Sans,sans-serif;';
        const heading = el('div', null);
        heading.style.cssText = 'flex-shrink:0;margin-bottom:7mm;padding-bottom:4mm;border-bottom:0.4mm solid #000;display:flex;align-items:baseline;justify-content:space-between;';
        const headTitle = el('span', null, pageIdx === 0 ? 'CONTENTS' : 'CONTENTS (CONT.)');
        headTitle.style.cssText = 'font-size:6mm;font-weight:300;letter-spacing:0.3em;color:#000;';
        heading.appendChild(headTitle);
        inner.appendChild(heading);

        let numCols = 1; let scale = 1;
        const itemsCount = pageItems.length;
        if(itemsCount > 90) { numCols = 3; scale = 0.75; }
        else if(itemsCount > 45) { numCols = 3; scale = 0.85; }
        else if(itemsCount > 25) { numCols = 2; scale = 0.9; }

        const cols = el('div', null);
        cols.style.cssText = `flex:1;overflow:hidden;display:flex;flex-direction:row;gap:10mm;font-size:${scale}em;`;

        const itemsPerCol = Math.ceil(itemsCount / numCols);
        for (let c = 0; c < numCols; c++) {
            const col = el('div', null);
            col.style.cssText = 'flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;';
            const slice = pageItems.slice(c * itemsPerCol, (c + 1) * itemsPerCol);
            slice.forEach(item => {
                if (item.isSectionHeader) {
                    const sec = el('div', null);
                    sec.style.cssText = 'display:flex;align-items:baseline;justify-content:space-between;padding:3.5mm 0 1.5mm 0;margin-top:2mm;border-bottom:0.25mm solid #000;flex-shrink:0;';
                    const t = el('span', null, item.title.toUpperCase());
                    t.style.cssText = 'font-size:2.6mm;font-weight:700;letter-spacing:0.15em;color:#000;';
                    const p = el('span', null, item.startPageNum !== null ? String(item.startPageNum) : '');
                    p.style.cssText = 'font-size:2.4mm;color:#555;font-weight:600;';
                    sec.appendChild(t); sec.appendChild(p);
                    col.appendChild(sec);
                } else {
                    const row = el('div', null);
                    row.style.cssText = 'display:flex;align-items:center;padding:1.6mm 0;border-bottom:0.1mm solid #f0f0f0;flex-shrink:0;';
                    const name = el('span', null, item.name);
                    name.style.cssText = 'font-size:2.3mm;font-weight:300;letter-spacing:0.04em;color:#222;flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding-right:3mm;';
                    const pgEl = el('span', null, item.pageNum !== null ? String(item.pageNum) : '');
                    pgEl.style.cssText = 'font-size:2.2mm;color:#999;flex-shrink:0;min-width:4mm;text-align:right;';
                    row.appendChild(name); row.appendChild(pgEl);
                    col.appendChild(row);
                }
            });
            cols.appendChild(col);
        }

        inner.appendChild(cols);
        page.appendChild(inner);
        addPageControls(page);
        pages.push(page);
    }
    return pages;
}

async function fetchCdnUrls() {
    const lines = document.getElementById('pageUrls').value.split('\n');
    const pagesContainer = document.getElementById('pagesContainer');
    const statusContainer = document.getElementById('statusContainer');
    const createButton = document.getElementById('createButton');
    if (!lines[0] || !lines[0].trim()) { showToast('No URLs provided', 'warning'); return; }
    pagesContainer.innerHTML = '';
    statusContainer.style.display = 'flex';
    createButton.disabled = true;
    try {
        const pageOrder = [];
        const sections = [];
        let currentSection = '';
        let hasCover = false;
        for (let i = 0; i < lines.length; i++) {
            const url = lines[i].trim();
            if (!url) continue;
            updateProgress((i / lines.length) * 100);
            if (url.startsWith('COVER')) {
                hasCover = true;
                pageOrder.push({ type: 'cover', page: createCoverPage(url.split(' - ')[1] || url), section: '' });
            } else if (url.startsWith('CONTENTS')) {
                currentSection = url.split(' - ')[1] || url.replace(/^CONTENTS\s*-?\s*/i, '').trim() || url;
                sections.push({ title: currentSection, urls: [], startPageNum: null });
                const sep = createContentsPage(currentSection, [], []);
                sep.dataset.sectionSeparator = 'true';
                sep.dataset.sectionTitle = currentSection;
                sep.style.display = 'none';
                pageOrder.push({ type: 'sectionSeparator', page: sep, section: currentSection });
            } else if (url.startsWith('BACK COVER')) {
                pageOrder.push({ type: 'backCover', page: createBackCoverPage(), section: '' });
            } else if (url === 'BLANK') {
                const bp = document.createElement('div');
                bp.classList.add('a4-page');
                addPageControls(bp);
                pageOrder.push({ type: 'blank', page: bp, section: '' });
            } else {
                if (sections.length) sections[sections.length - 1].urls.push(url);
                try {
                    updateStatus(`Processing ${i + 1}/${lines.length}: ${url.split('/').pop()}`);
                    await fetchPage(url);
                    await delay(500);
                    if ((i + 1) % 3 === 0) await delay(1000);
                    pageOrder.push({ type: 'url', page: pagesContainer.lastChild, section: currentSection });
                } catch { showToast(`Error: ${url.split('/').pop()}`, 'error'); }
            }
        }
        pagesContainer.innerHTML = '';
        let insidePageNum = 1;
        pageOrder.forEach(item => { item._pageNum = (item.type === 'url') ? insidePageNum++ : null; });
        sections.forEach(sec => {
            let first = true;
            pageOrder.forEach(item => {
                if (item.type === 'url' && item.section === sec.title && first) {
                    sec.startPageNum = item._pageNum;
                    first = false;
                }
            });
        });
        
        if (hasCover && sections.length > 0) {
            const masterContentsPages = createMasterContentsPages(sections, pageOrder);
            masterContentsPages.forEach(p => p.dataset.pageType = 'contents');
            
            pageOrder.forEach(item => {
                if (!item.page) return;
                pagesContainer.appendChild(item.page);
                if (item.type === 'cover') {
                    masterContentsPages.forEach(mcp => pagesContainer.appendChild(mcp));
                }
            });
        } else {
            pageOrder.forEach(item => { if (item.page) pagesContainer.appendChild(item.page); });
        }

        if (hasCover) {
            const allPages = Array.from(pagesContainer.querySelectorAll('.a4-page:not([data-section-separator])'));
            let visibleIdx = 0;
            allPages.forEach(page => {
                const matchingItem = pageOrder.find(it => it.page === page);
                if (!matchingItem || matchingItem.type === 'cover' || matchingItem.type === 'backCover' || matchingItem.type === 'blank') {
                    visibleIdx++;
                    return;
                }
                const pgNum = matchingItem._pageNum;
                const section = matchingItem.section || '';
                if (!pgNum) { visibleIdx++; return; }
                const isRight = (visibleIdx % 2 === 0);
                const footer = el('div', null);
                footer.className = 'pg-footer';
                const leftEl = el('span', null, isRight ? '' : section);
                leftEl.className = 'pg-footer-left';
                const centerEl = el('span', null, String(pgNum));
                centerEl.className = 'pg-footer-center';
                const rightEl = el('span', null, isRight ? section : '');
                rightEl.className = 'pg-footer-right';
                footer.appendChild(leftEl);
                footer.appendChild(centerEl);
                footer.appendChild(rightEl);
                page.appendChild(footer);
                visibleIdx++;
            });
        }
        updatePageNavigator();
        showToast('Brochure created', 'success');
    } catch (e) { console.error(e); showToast('Error creating brochure', 'error'); }
    finally { statusContainer.style.display = 'none'; createButton.disabled = false; updateStatus('Done'); }
}

function updateStatus(msg) { document.getElementById('statusText').textContent = msg; }
function updateProgress(pct) { document.getElementById('progressBar').style.width = `${pct}%`; }
function hideProgress() { document.getElementById('progressBar').style.width = '0%'; }

function updatePageNavigator() {
    const nav = document.getElementById('pageNavigator');
    const pages = Array.from(document.querySelectorAll('.a4-page'));
    if (!pages.length) { nav.style.display = 'none'; return; }
    nav.innerHTML = '';
    nav.style.display = 'flex';
    pages.forEach((page, i) => {
        const dot = document.createElement('div');
        dot.className = 'page-navigator-dot';
        const tip = document.createElement('div');
        tip.className = 'tooltip';
        tip.textContent = page.dataset.productName || `Page ${i+1}`;
        dot.appendChild(tip);
        dot.addEventListener('click', () => page.scrollIntoView({ behavior:'smooth' }));
        nav.appendChild(dot);
    });
    const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                const idx = pages.indexOf(e.target);
                nav.querySelectorAll('.page-navigator-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
            }
        });
    }, { threshold: 0.5 });
    pages.forEach(p => obs.observe(p));
}

function printPage() {
    const pages = document.querySelectorAll('.a4-page');
    if (pages.length) {
        const last = pages[pages.length-1];
        const orig = last.style.pageBreakAfter;
        last.style.pageBreakAfter = 'auto';
        window.print();
        setTimeout(() => { last.style.pageBreakAfter = orig; }, 1000);
    } else { window.print(); }
}

function clearAll() {
    if (!confirm('Clear all data?')) return;
    document.getElementById('pageUrls').value = '';
    document.getElementById('urlInput').value = '';
    document.getElementById('pagesContainer').innerHTML = '';
    document.getElementById('results').innerHTML = '';
    visitedLinks.clear(); processedUrls.clear();
    updatePageNavigator();
    showToast('All data cleared', 'info');
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pageUrls').addEventListener('input', function() {
        document.getElementById('createButton').disabled = !this.value.trim();
    });
    updatePageNavigator();
});
</script>
