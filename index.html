<body>
<div class="container">
    <div class="top-container">
        <h1>SELL SHEET / BROCHURE CREATOR</h1>
        <div class="left">
            <div class="input-section">
                <label for="pageUrls">PAGES (supports MERGE syntax: <code>MERGE A - url</code>, <code>MERGE B - url</code> etc):</label>
                <textarea id="pageUrls" placeholder="Paste one URL per line. Use 'MERGE A - url' / 'MERGE B - url' to combine products onto one page.
Examples:
https://www.futureautomation.co.uk/Product/Details/PS40
MERGE A - https://www.futureautomation.co.uk/Product/Details/FSE90
MERGE A - https://www.futureautomation.co.uk/Product/Details/PSE90">https://www.futureautomation.co.uk/Product/Details/PLFS</textarea>
            </div>
            <div class="input-section">
                <label for="urlInput">PASTE URLS HERE TO GENERATE BROCHURE:</label>
                <textarea id="urlInput" placeholder="Paste a url from the website here and then 'Generate List' 
Eg. https:www.futureautomation.co.uk/Product">https://www.futureautomation.co.uk/TV</textarea>
            </div>
            <div class="button-container">
                <button type="button" id="createButton" onclick="fetchCdnUrls()"><i class="fas fa-file-pdf"></i> Build Pages</button>
                <button type="button" onclick="startScraping()"><i class="fas fa-list"></i> Generate Pages</button>
                <button type="button" onclick="printPage()"><i class="fas fa-download"></i> Export Brochure</button>
                <button type="button" onclick="exportSellSheets()"><i class="fas fa-file-export"></i> Export Sell Sheets</button>
                <button type="button" onclick="clearAll()"><i class="fas fa-trash"></i> Clear All</button>
            </div>
            <div class="status-container" id="statusContainer" style="display:none;">
                <div class="spinner"></div>
                <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
                <span class="status-text" id="statusText">Ready</span>
            </div>
        </div>
    </div>
</div>

<div id="pagesContainer"></div>
<div id="results" style="display:none;"></div>
<div class="page-navigator" id="pageNavigator" style="display:none;"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
const visitedLinks = new Set();
const processedUrls = new Set();
const corsProxyAPI = 'https://api.codetabs.com/v1/proxy?quest=';
const cacheExpirationTime = 30 * 60 * 1000;
const cache = {
    data: {},
    set(k, v) { this.data[k] = { value: v, timestamp: Date.now() }; },
    get(k) {
        const item = this.data[k];
        if (!item) return null;
        if (Date.now() - item.timestamp > cacheExpirationTime) { delete this.data[k]; return null; }
        return item.value;
    },
    clear() { this.data = {}; }
};
const excludeKeywords = ['Login','Account','mailto:','facebook.com','twitter.com','instagram.com','linkedin.com','privacy','terms','cookies','copyright','sitemap','contact-us','about-us','help','faq'];

const DEFAULT_HIDDEN_SPECS = [
    'DOWNLOADS', 'EXAMPLE TECHNICAL SHEETS', 'SHIPPING DIMENSIONS',
    'VIDEO INSTRUCTIONS', 'SHIPPING WEIGHT', "WHAT'S INCLUDED",
    'SHIPPING DIM', 'SHIPPING DIMS', 'TECH SHEET', 'TECHNICAL SHEET',
    'SELL SHEET', 'CAD', 'INSTRUCTIONS'
];

function showToast(message, type = 'info', duration = 5000) {
    const tc = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', warning:'fa-exclamation-triangle' };
    toast.innerHTML = `<i class="fas ${icons[type]||'fa-info-circle'}"></i><span>${message}</span><div class="toast-progress"><div class="toast-progress-bar"></div></div>`;
    tc.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease-out forwards';
        setTimeout(() => { if (tc.contains(toast)) tc.removeChild(toast); }, 300);
    }, duration);
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
async function fetchWithRetry(url, retries = 10) {
    const cached = cache.get(url);
    if (cached) return cached;
    for (let i = 0; i < retries; i++) {
        try {
            updateStatus(`Fetching: ${url.split('/').pop()}... (Attempt ${i + 1}/${retries})`);
            const proxyUrl = `${corsProxyAPI}${encodeURIComponent(url)}`;
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 25000);
            const res = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (res.status === 429 || res.status === 503 || res.status === 502) {
                const wait = 6000 + i * 2000;
                updateStatus(`Rate limited. Waiting ${wait / 1000}s...`);
                await delay(wait);
                continue;
            }
            if (!res.ok) {
                if (res.status === 404) throw new Error('404 Not Found');
                throw new Error(`HTTP ${res.status}`);
            }
            const ct = res.headers.get('content-type') || '';
            let html = '';
            if (ct.includes('application/json')) {
                const json = await res.json();
                html = json.contents || '';
            } else {
                html = await res.text();
            }
            if (!html || html.length < 500 || !html.toLowerCase().includes('futureautomation')) {
                throw new Error('Invalid or empty content');
            }
            const data = { contents: html };
            cache.set(url, data);
            return data;
        } catch (err) {
            if (err.message === '404 Not Found') throw err;
            if (i < retries - 1) {
                const wait = 2000 + i * 1000;
                updateStatus(`Error (${err.message}). Retrying in ${wait / 1000}s...`);
                await delay(wait);
            } else {
                throw err;
            }
        }
    }
    throw new Error('Max retries exceeded');
}
async function fetchAndBuildPage(url) {
    const data = await fetchWithRetry(url, 10);
    const doc = new DOMParser().parseFromString(data.contents, 'text/html');
    processPageContent(doc, url);
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
}
async function fetchHTML(url) {
    try {
        await delay(500);
        const data = await fetchWithRetry(url, 5);
        return data.contents;
    } catch {
        return '';
    }
}
function shouldExclude(href) { return excludeKeywords.some(k => href.includes(k)); }
async function getSublinks(url, baseUrl) {
    const html = await fetchHTML(url);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const sublinks = [];
    const main = doc.querySelector('main') || doc.body;
    if(!main) return sublinks;
    main.querySelectorAll('a:not(nav a):not(footer a):not(.MegaMenu a):not(.btn)').forEach(a => {
        const href = a.getAttribute('href');
        if (href && href.startsWith('/') && !href.includes('#') && !visitedLinks.has(href) && !shouldExclude(href)) {
            sublinks.push(new URL(href, baseUrl).href);
            visitedLinks.add(href);
        }
    });
    return sublinks;
}
async function getProductLinks(url) {
    const html = await fetchHTML(url);
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const links = new Set();
    const ex = ['/Product/EnclosureParts','/Product/EnclosureSupport','/Product/AudioVisual'];
    doc.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (href && href.startsWith('/Product/') && !ex.some(e => href.includes(e))) {
            if (/^\/Product\/Details\/[A-Z0-9-]+$/.test(href) || /^\/Product\/[A-Za-z]+$/.test(href)) {
                links.add(new URL(href, url).href);
            }
        }
    });
    return Array.from(links);
}
function formatTitle(url) { return url.split('/').pop().replace(/([a-z])([A-Z])/g,'$1 $2').replace(/-/g,' ').toUpperCase(); }
async function scrape(url, parentDiv, baseUrl) {
    if (visitedLinks.has(url)) return;
    visitedLinks.add(url);
    updateStatus(`Scraping: ${url.split('/').pop()}`);
    try {
        const productLinks = await getProductLinks(url);
        if (productLinks.length > 0) {
            const h = document.createElement('div');
            h.textContent = 'CONTENTS - ' + formatTitle(url);
            h.dataset.url = url;
            parentDiv.appendChild(h);
            for (const link of productLinks) {
                const d = document.createElement('div');
                d.textContent = link;
                d.dataset.url = url;
                parentDiv.appendChild(d);
            }
            updatePageURLs();
            return;
        }
        const sublinks = await getSublinks(url, baseUrl);
        for (const sub of sublinks) { await delay(400); await scrape(sub, parentDiv, baseUrl); }
    } catch { showToast(`Error scraping ${url.split('/').pop()}`, 'error'); }
}
async function scrapeMultipleWebsites(urls) {
    const resultsDiv = document.getElementById('results');
    const spinner = document.querySelector('.spinner');
    document.getElementById('statusContainer').style.display = 'flex';
    if (spinner) spinner.style.display = '';
    resultsDiv.innerHTML = '';
    try {
        removeBackCoverAndBlanks();
        const cover = document.createElement('div');
        cover.textContent = `COVER - ${urls.map(u => formatTitle(u)).join(', ')} GUIDE`;
        resultsDiv.insertBefore(cover, resultsDiv.firstChild);
        let done = 0;
        for (const url of urls) {
            if (!processedUrls.has(url)) {
                updateStatus(`Processing (${done+1}/${urls.length}): ${url.split('/').pop()}`);
                await scrape(url, resultsDiv, new URL(url).origin);
                processedUrls.add(url);
                updateProgress((++done / urls.length) * 100);
            }
        }
        updatePageURLs();
        showToast('List generation complete', 'success');
    } catch { showToast('Error during list generation', 'error'); }
    finally {
        updateStatus('Done - Select Create Brochure');
        hideProgress();
        if (spinner) spinner.style.display = 'none';
    }
}
function removeBackCoverAndBlanks() {
    Array.from(document.getElementById('results').children)
        .filter(d => d.textContent === 'BACK COVER' || d.textContent === 'BLANK')
        .forEach(d => d.remove());
}
function startScraping() {
    visitedLinks.clear(); processedUrls.clear();

function classifyImages(carouselImgs, productCode) {
    const code = productCode.toLowerCase();
    const lifestyle = [], product = [];
    const seen = new Set();
    carouselImgs.forEach(img => {
        const src = img.src || '';
        if (!src || seen.has(src)) return;
        seen.add(src);
        const srcLower = src.toLowerCase();
        const filename = src.split('/').pop().split('?')[0].toLowerCase();
        if (srcLower.includes('/product/video/')) { return; }
        else if (srcLower.includes('/product/gallery/')) { lifestyle.push(src); }
        else if (srcLower.includes('/product/main/') && filename.startsWith(code)) { product.push(src); }
        else if (filename.startsWith(code)) { product.push(src); }
        else { lifestyle.push(src); }
    });
    return { lifestyle, product };
}

function isSpecHidden(specName) {
    const u = specName.toUpperCase();
    return DEFAULT_HIDDEN_SPECS.some(h => u.includes(h));
}

function extractSpecDataFromTable(tbl) {
    if (!tbl) return { categories: [], rows: [] };
    const rows = Array.from(tbl.querySelectorAll('tr'));
    const categories = [];
    const dataRows = [];
    let currentCategory = null;
    rows.forEach(row => {
        const cells = Array.from(row.cells);
        if (cells.length === 0) return;
        const isCategoryHeader = cells.length === 1 || (cells.length > 1 && cells.slice(1).every(c => c.textContent.trim() === ''));
        if (isCategoryHeader && cells[0].textContent.trim()) {
            currentCategory = cells[0].textContent.trim();
            if (!categories.includes(currentCategory)) categories.push(currentCategory);
        } else if (cells.length > 1) {
            const label = cells[0].textContent.trim();
            const values = cells.slice(1).map(c => c.innerHTML.trim());
            dataRows.push({ label, values, category: currentCategory });
        }
    });
    return { categories, rows: dataRows };
}

function mergeSpecData(specDataArray) {
    const allCategories = [];
    const seenCats = new Set();
    specDataArray.forEach(sd => {
        sd.categories.forEach(c => { if (!seenCats.has(c)) { seenCats.add(c); allCategories.push(c); } });
    });
    const allLabelMap = new Map();
    specDataArray.forEach((sd, idx) => {
        sd.rows.forEach(row => {
            const key = (row.category || '') + '|||' + row.label;
            if (!allLabelMap.has(key)) {
                allLabelMap.set(key, { label: row.label, category: row.category, valuesByProduct: [] });
            }
            allLabelMap.get(key).valuesByProduct[idx] = row.values;
        });
    });
    const mergedRows = [];
    allLabelMap.forEach(v => mergedRows.push(v));
    return { categories: allCategories, rows: mergedRows, productCount: specDataArray.length };
}

function buildMergedSpecTable(mergedSpec, productNames, specVisibility) {
    const tbl = document.createElement('table');
    tbl.className = 'fa-spectable';
    const thead = document.createElement('thead');
    const hdrRow = document.createElement('tr');
    const th0 = document.createElement('th');
    th0.textContent = 'SPECIFICATION';
    th0.style.width = '28%';
    hdrRow.appendChild(th0);
    productNames.forEach(name => {
        const th = document.createElement('th');
        th.textContent = name;
        hdrRow.appendChild(th);
    });
    thead.appendChild(hdrRow);
    tbl.appendChild(thead);
    const tbody = document.createElement('tbody');
    tbl.appendChild(tbody);

    function renderRows() {
        tbody.innerHTML = '';
        let lastCat = null;
        let rowIndex = 0;
        mergedSpec.rows.forEach(row => {
            if (specVisibility && !specVisibility[row.label]) return;
            if (isSpecHidden(row.label)) return;
            if (row.category && row.category !== lastCat) {
                const catRow = document.createElement('tr');
                catRow.className = 'cat-header';
                const catTd = document.createElement('td');
                catTd.textContent = row.category;
                catTd.colSpan = productNames.length + 1;
                catRow.appendChild(catTd);
                tbody.appendChild(catRow);
                lastCat = row.category;
            }
            const tr = document.createElement('tr');
            tr.style.background = rowIndex % 2 === 0 ? '#fff' : '#fafafa';
            rowIndex++;
            const td0 = document.createElement('td');
            td0.textContent = row.label;
            tr.appendChild(td0);

            // Build per-column display text, deduplicating repeated values within each cell
            // (e.g. ["58DB","58DB","58DB"] becomes "58DB", not "58DB<br>58DB<br>58DB")
            const cellTexts = [];
            const cellNorm = [];
            for (let i = 0; i < productNames.length; i++) {
                const vals = row.valuesByProduct[i];
                let display, norm;
                if (!vals || vals.length === 0) {
                    display = 'N/A';
                    norm = 'N/A';
                } else {
                    // Deduplicate by normalised text, preserving first-seen order
                    const seen = new Set();
                    const unique = [];
                    vals.forEach(v => {
                        const key = v.replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim().toUpperCase();
                        if (!seen.has(key)) { seen.add(key); unique.push(v); }
                    });
                    display = unique.join('<br>') || 'N/A';
                    norm = [...seen].join('|') || 'N/A';
                }
                cellTexts.push(display);
                cellNorm.push(norm);
            }
            // If every column's normalised value is identical, merge into one spanning cell
            const allSame = cellNorm.length > 1 && cellNorm.every(v => v === cellNorm[0]);
            if (allSame) {
                const td = document.createElement('td');
                td.colSpan = productNames.length;
                td.innerHTML = cellTexts[0];
                td.style.textAlign = 'center';
                tr.appendChild(td);
            } else {
                for (let i = 0; i < productNames.length; i++) {
                    const td = document.createElement('td');
                    td.innerHTML = cellTexts[i];
                    tr.appendChild(td);
                }
            }
            tbody.appendChild(tr);
        });
    }
    tbl.renderRows = renderRows;
    renderRows();
    return tbl;
}

function buildSingleSpecTable(specTable, specVisibility) {
    if (!specTable) return null;
    const extracted = extractSpecDataFromTable(specTable);
    const tbl = document.createElement('table');
    tbl.className = 'fa-spectable';
    const thead = document.createElement('thead');
    const originalThead = specTable.querySelector('thead');
    if (originalThead) {
        thead.innerHTML = originalThead.innerHTML;
    }
    tbl.appendChild(thead);
    const tbody = document.createElement('tbody');
    tbl.appendChild(tbody);

    function renderRows() {
        tbody.innerHTML = '';
        let lastCat = null;
        let rowIndex = 0;
        extracted.rows.forEach(row => {
            if (specVisibility && specVisibility[row.label] === false) return;
            if (isSpecHidden(row.label)) return;
            if (row.category && row.category !== lastCat) {
                const catRow = document.createElement('tr');
                catRow.className = 'cat-header';
                const catTd = document.createElement('td');
                catTd.textContent = row.category;
                catTd.colSpan = 100;
                catRow.appendChild(catTd);
                tbody.appendChild(catRow);
                lastCat = row.category;
            }
            const tr = document.createElement('tr');
            tr.style.background = rowIndex % 2 === 0 ? '#fff' : '#fafafa';
            rowIndex++;
            const td0 = document.createElement('td');
            td0.textContent = row.label;
            tr.appendChild(td0);
            row.values.forEach(v => {
                const td = document.createElement('td');
                td.innerHTML = v || 'N/A';
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }
    tbl.renderRows = renderRows;
    tbl._extracted = extracted;
    renderRows();
    return tbl;
}

        const extracted = extractSpecDataFromTable(specTableEl);
        extracted.rows.forEach(r => { specVis[r.label] = !isSpecHidden(r.label); });
        renderedSpecTable = buildSingleSpecTable(specTableEl, specVis);
        renderedSpecTable._extracted = extracted;
        specCol.appendChild(makeSpecZone(renderedSpecTable));
    }
    layoutContainer.appendChild(specCol);
    let state = {
        lsVisible: lifestyleImgs ? Math.min(lifestyleImgs.length, 3) : 0,
        imgVisible: productImgs ? Math.min(productImgs.length, 2) : 0,
        hasSpec: !!specTableEl,
        descVisible: true
    };
    function renderGrid() {
        imgCol.innerHTML = '';
        lsCol.innerHTML = '';
        imgCol.style.justifyContent = 'flex-start';
        textCol.style.justifyContent = 'flex-start';
        desc.style.display = state.descVisible ? '' : 'none';
        if(state.imgVisible > 0) {
            const isGrid = (state.imgVisible === 4 || state.imgVisible === 2) && state.lsVisible === 0;
            imgCol.style.display = isGrid ? 'grid' : 'flex';
            if (isGrid) {
                imgCol.style.gridTemplateColumns = '1fr 1fr';
                imgCol.style.gridTemplateRows = state.imgVisible === 4 ? '1fr 1fr' : '1fr';
            } else {
                imgCol.style.gridTemplateColumns = '';
                imgCol.style.gridTemplateRows = '';
            }
            for (let i = 0; i < state.imgVisible; i++) {
                if (i < productImgs.length) {
                    const z = makeSlot(productImgs, i, state.imgVisible, 'product');
                    if (!isGrid) {
                        z.style.flex = '1';
                        if (i > 0) z.style.borderTop = '0.2mm solid #e8e8e8';
                        if (i > 0) z.style.paddingTop = '2mm';
                    } else {
                        z.style.borderTop = 'none';
                        z.style.paddingTop = '0';
                    }
                    imgCol.appendChild(z);
                }
            }
        } else {
            imgCol.style.display = 'none';
        }
        let isBannerLS = (state.imgVisible === 1 && state.lsVisible === 3 && !state.hasSpec) || (state.imgVisible === 1 && state.lsVisible === 1);
        if(state.lsVisible > 0) {
            lsCol.style.display = 'flex';
            if(state.lsVisible === 1 || state.lsVisible === 2) {
                lsCol.style.flexDirection = 'column';
                if (isBannerLS) lsCol.style.flexDirection = 'row';
                for (let i = 0; i < state.lsVisible; i++) {
                    if (i < lifestyleImgs.length) {
                        const z = makeSlot(lifestyleImgs, i, state.lsVisible, 'lifestyle');
                        z.style.flex = '1';
                        lsCol.appendChild(z);
                    }
                }
            } else {
                lsCol.style.flexDirection = (state.imgVisible === 0 || isBannerLS) ? 'row' : 'column';
                const z1 = makeSlot(lifestyleImgs, 0, state.lsVisible, 'lifestyle');
                z1.style.flex = '2';
                lsCol.appendChild(z1);
                const sub = el('div', 'display:flex;gap:2mm;flex-shrink:0;flex:1;min-height:0;');
                sub.style.flexDirection = (state.imgVisible === 0 || isBannerLS) ? 'column' : 'row';
                for(let n=1; n<3; n++) {
                    if (n < lifestyleImgs.length) {
                        const z = makeSlot(lifestyleImgs, n, state.lsVisible, 'lifestyle');
                        z.style.flex = '1';
                        sub.appendChild(z);
                    }
                }
                lsCol.appendChild(sub);
            }
        } else {
            lsCol.style.display = 'none';
        }
        specCol.style.display = state.hasSpec ? 'flex' : 'none';
        let gridCols = '1fr';
        let gridAreas = '';
        let gridRows = '';
        if (state.imgVisible === 0) {
            gridCols = '1fr';
            if (state.lsVisible === 0) {
                gridAreas = state.hasSpec ? '"hd" "tx" "sp"' : '"hd" "tx"';
                gridRows = state.hasSpec ? 'auto 1fr auto' : 'auto 1fr';
            } else {
                gridAreas = state.hasSpec ? '"hd" "ls" "tx" "sp"' : '"hd" "ls" "tx"';
                gridRows = state.hasSpec ? 'auto auto 1fr auto' : 'auto auto 1fr';
            }
        }
        else if (state.imgVisible === 1) {
            if (state.lsVisible === 0) {
                gridCols = '1fr';
                gridAreas = state.hasSpec ? '"hd" "im" "tx" "sp"' : '"hd" "im" "tx" "."';
                gridRows = state.hasSpec ? 'auto fit-content(45%) 1fr auto' : 'auto fit-content(45%) 1fr 12%';
            } else if (state.lsVisible === 1) {
                gridCols = '40% 1fr';
                gridAreas = state.hasSpec ? '"hd hd" "ls ls" "im tx" "sp sp"' : '"hd hd" "ls ls" "im tx"';
                gridRows = state.hasSpec ? 'auto auto 1fr auto' : 'auto auto 1fr';
                imgCol.style.justifyContent = 'flex-start';
                if (imgCol.firstElementChild) imgCol.firstElementChild.style.alignItems = 'flex-start';
            } else if (state.lsVisible === 3 && !state.hasSpec) {
                gridCols = '40% 1fr';
                gridAreas = '"hd hd" "ls ls" "im tx"';
                gridRows = 'auto auto 1fr';
                imgCol.style.justifyContent = 'flex-start';
                textCol.style.justifyContent = 'flex-start';
            } else {
                gridCols = '40% 1fr';
                gridAreas = state.hasSpec ? '"hd hd" "im ls" "tx tx" "sp sp"' : '"hd hd" "im ls" "tx tx"';
                gridRows = state.hasSpec ? 'auto 1fr fit-content(35%) auto' : 'auto 1fr fit-content(45%)';
            }
        }
        else if (state.imgVisible === 2 && state.lsVisible === 0) {
            gridCols = '1fr';
            gridAreas = state.hasSpec ? '"hd" "im" "tx" "sp"' : '"hd" "im" "tx"';
            gridRows = state.hasSpec ? 'auto fit-content(40%) 1fr auto' : 'auto fit-content(40%) 1fr';
        }
        else if (state.imgVisible === 3 && state.lsVisible === 0 && state.hasSpec) {
            gridCols = '38% 1fr';
            gridAreas = '"hd hd" "im tx" "im sp" "im ."';
            gridRows = 'auto max-content max-content 1fr';
        }
        else if (state.imgVisible === 4 && state.lsVisible === 0) {
            gridCols = '1fr';
            gridAreas = state.hasSpec ? '"hd" "im" "tx" "sp"' : '"hd" "im" "tx"';
            gridRows = state.hasSpec ? 'auto fit-content(45%) 1fr auto' : 'auto fit-content(45%) 1fr';
        }
        else {
            gridCols = '38% 1fr';
            if (state.lsVisible === 0) {
                gridAreas = state.hasSpec ? '"hd hd" "im tx" "sp sp"' : '"hd hd" "im tx"';
                gridRows = state.hasSpec ? 'auto 1fr auto' : 'auto 1fr';
            } else {
                if (!state.hasSpec && state.imgVisible === 2) {
                    gridAreas = '"hd hd" "im tx" "im ls" "im ."';
                    gridRows = 'auto max-content max-content 1fr';
                } else {
                    gridAreas = state.hasSpec ? '"hd hd" "im tx" "im ls" "sp sp"' : '"hd hd" "im tx" "im ls"';
                    gridRows = state.hasSpec ? 'auto fit-content(35%) 1fr auto' : 'auto fit-content(45%) 1fr';
                }
            }
        }
        layoutContainer.style.gridTemplateColumns = gridCols;
        layoutContainer.style.gridTemplateRows = gridRows;
        layoutContainer.style.gridTemplateAreas = gridAreas;
        if (state.imgVisible === 0 && state.lsVisible === 2 && state.hasSpec) {
            if (textCol.scrollHeight > textCol.clientHeight + 5 || layoutContainer.scrollHeight > layoutContainer.clientHeight + 5) {
                lsCol.style.flexDirection = 'row';
                layoutContainer.style.gridTemplateRows = 'auto min-content 1fr auto';
            }
        }
        if (state.imgVisible === 1 && state.lsVisible === 0) {
            imgCol.style.alignItems = 'center';
            if (imgCol.firstElementChild) imgCol.firstElementChild.style.width = '60%';
        }
    }
    const editor = el('div', null);
    editor.className = 'pg-editor';
    if (lifestyleImgs && lifestyleImgs.length > 0) {
        const maxL = Math.min(lifestyleImgs.length, 3);
        const lsSec = el('div', null);
        lsSec.className = 'pg-editor-section';
        lsSec.appendChild(el('span', 'font-size:1.6mm;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;margin-right:1mm;', 'Lifestyle'));
        for(let i = 0; i <= maxL; i++) {
            const btn = el('button', null, String(i));
            btn.className = 'pg-ed-btn' + (i === state.lsVisible ? ' active' : '');
            btn.onclick = () => {
                state.lsVisible = i;
                lsSec.querySelectorAll('.pg-ed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGrid();
            };
            lsSec.appendChild(btn);
        }
        editor.appendChild(lsSec);
    }
    if (productImgs && productImgs.length > 0) {
        const maxI = Math.min(productImgs.length, 4);
        const imgSec = el('div', null);
        imgSec.className = 'pg-editor-section';
        imgSec.appendChild(el('span', 'font-size:1.6mm;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;margin-right:1mm;', 'Images'));
        for(let i = 0; i <= maxI; i++) {
            const btn = el('button', null, String(i));
            btn.className = 'pg-ed-btn' + (i === state.imgVisible ? ' active' : '');
            btn.onclick = () => {
                state.imgVisible = i;
                imgSec.querySelectorAll('.pg-ed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGrid();
            };
            imgSec.appendChild(btn);
        }
        editor.appendChild(imgSec);
    }
    const delSection = el('div', null);
    delSection.className = 'pg-editor-section';
    const delBtn = el('button', null, '✕ Delete page');
    delBtn.className = 'pg-ed-btn del';
    delBtn.onclick = () => {
        if (confirm('Delete this page?')) {
            const wrapper = inner.closest('.page-wrapper-outer') || inner.closest('.a4-page');
            wrapper.remove();
            updatePageNavigator();
        }
    };
    delSection.appendChild(delBtn);
    editor.appendChild(delSection);
    inner.appendChild(editor);
    renderGrid();
    return { state, renderGrid, specVis, renderedSpecTable, specZoneEl: specCol };
}

function buildMergedLayout(inner, products, mergedSpecTable, mergedSpec) {
    const n = products.length;
    const useGridMode = n >= 5;

    const specVisMap = {};
    if (mergedSpec) mergedSpec.rows.forEach(r => { specVisMap[r.label] = !isSpecHidden(r.label); });

    let builtSpecTable = null;

    // Pool all lifestyle images from every product, deduped
    const allLifestyleImgs = [];
    products.forEach(p => { if (p.lifestyleImgs) p.lifestyleImgs.forEach(src => { if (!allLifestyleImgs.includes(src)) allLifestyleImgs.push(src); }); });

    // State
    const imgStates = products.map(p => ({ imgVisible: p.productImgs ? Math.min(p.productImgs.length, 1) : 0 }));
    let lsVisible = allLifestyleImgs.length > 0 ? Math.min(allLifestyleImgs.length, 1) : 0;
    // Which lifestyle images are selected (indices into allLifestyleImgs)
    let lsSelected = [0, 1, 2].slice(0, Math.min(3, allLifestyleImgs.length));
    let descVisible = !useGridMode;
    let hasSpec = !!mergedSpecTable;

    // ── Grid cols helper ─────────────────────────────────────────────────────
    function getGridCols(count) {
        if (count <= 4)  return count;
        if (count <= 6)  return 3;
        if (count <= 9)  return 3;
        if (count <= 12) return 4;
        if (count <= 16) return 4;
        return 5;
    }

    // ── Outer scaffold ───────────────────────────────────────────────────────
    const outerGrid = el('div', 'display:grid;gap:3mm;height:100%;width:100%;min-height:0;');
    inner.appendChild(outerGrid);
    const hdr = makeHeader('', '', []);
    hdr.style.gridArea = 'hd';
    outerGrid.appendChild(hdr);

    // The main content area — will be restructured in renderGrid
    const mainArea = el('div', 'grid-area:cr;min-height:0;overflow:hidden;display:grid;');
    outerGrid.appendChild(mainArea);

    const specZoneWrap = el('div', 'grid-area:sp;overflow:hidden;display:flex;flex-direction:column;min-height:0;flex-shrink:0;');
    outerGrid.appendChild(specZoneWrap);

    if (mergedSpecTable && mergedSpec) {
        builtSpecTable = buildMergedSpecTable(mergedSpec, products.map(p => p.productCode), specVisMap);
        specZoneWrap.appendChild(makeSpecZone(builtSpecTable));
    }

    // ── Helper: make a lifestyle image slot that fills its cell ──────────────
    function makeLsCell(imgIdx) {
        const src = allLifestyleImgs[imgIdx % allLifestyleImgs.length];
        const wrap = el('div', 'min-height:0;overflow:hidden;border-radius:2mm;width:100%;height:100%;');
        const img = el('img', 'width:100%;height:100%;object-fit:cover;display:block;');
        img.src = src;
        wrap.appendChild(img);
        return wrap;
    }

    // ── Helper: make a product card (grid mode) ──────────────────────────────
    function makeProductCard(prod) {
        const fs = n > 16 ? '1.5mm' : '1.8mm';
        const card = el('div', 'display:grid;grid-template-rows:1fr auto;gap:1mm;min-height:0;overflow:hidden;background:#fff;padding:1mm;');
        const imgWrap = el('div', 'min-height:0;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;');
        if (prod.productImgs && prod.productImgs.length > 0) {
            const img = el('img', 'max-width:100%;max-height:100%;object-fit:contain;display:block;');
            img.src = prod.productImgs[0];
            imgWrap.appendChild(img);
        }
        card.appendChild(imgWrap);
        const nameWrap = el('div', 'flex-shrink:0;overflow:hidden;border-top:0.2mm solid #eee;padding-top:0.8mm;');
        const codeEl = el('div', `font-size:${fs};font-weight:600;color:#000;letter-spacing:0.04em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`, prod.productCode);
        nameWrap.appendChild(codeEl);
        if (prod.subtitle) {
            const subEl = el('div', `font-size:${n > 16 ? '1.2mm' : '1.3mm'};color:#888;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:0.3mm;`, prod.subtitle);
            nameWrap.appendChild(subEl);
        }
        card.appendChild(nameWrap);
        return card;
    }

    // ── Column mode panels (built once) ─────────────────────────────────────
    let productPanels = [];
    let colContainer = null;
    if (!useGridMode) {
        colContainer = el('div', `display:grid;gap:3mm;height:100%;width:100%;min-height:0;grid-template-columns:${products.map(() => '1fr').join(' ')};`);
        productPanels = products.map((prod, idx) => {
            const fontSize = n === 2 ? '2.3mm' : (n === 3 ? '2.1mm' : '1.9mm');
            const panel = el('div', `display:grid;gap:2mm;min-height:0;overflow:hidden;${idx > 0 ? 'border-left:0.3mm solid #e8e8e8;padding-left:3mm;' : ''}`);
            const nameBox = el('div', null);
            nameBox.className = 'fa-namebox';
            nameBox.style.cssText = 'flex-shrink:0;grid-area:nm;';
            nameBox.innerHTML = `<div class="fa-pname-merged">${prod.productCode}</div>${prod.subtitle ? `<div class="fa-psub">${prod.subtitle}</div>` : ''}`;
            panel.appendChild(nameBox);
            const descEl = el('div', null, prod.descHTML);
            descEl.className = 'fa-desc';
            descEl.style.cssText += `font-size:${fontSize};grid-area:tx;`;
            panel.appendChild(descEl);
            const imgGrid = el('div', 'grid-area:im;display:grid;gap:1.5mm;min-height:0;overflow:hidden;');
            panel.appendChild(imgGrid);
            colContainer.appendChild(panel);
            return { panel, nameBox, descEl, imgGrid, prod };
        });
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function renderGrid() {
        const lsCount = Math.min(lsVisible, allLifestyleImgs.length);
        const anyLS = lsCount > 0;

        outerGrid.style.gridTemplateColumns = '1fr';
        outerGrid.style.gridTemplateAreas = hasSpec ? `"hd" "cr" "sp"` : `"hd" "cr"`;
        outerGrid.style.gridTemplateRows = hasSpec ? 'auto 1fr auto' : 'auto 1fr';
        specZoneWrap.style.display = hasSpec ? 'flex' : 'none';

        mainArea.innerHTML = '';

        // ── GRID MODE ────────────────────────────────────────────────────────
        if (useGridMode) {
            const cols = getGridCols(n);
            const totalCells = Math.ceil(n / cols) * cols;
            const emptySlots = totalCells - n;

            // Decide lifestyle placement: trailing cells, or a dedicated banner row
            const lsFitsTrailing = anyLS && emptySlots >= lsCount;
            const lsNeedsBanner  = anyLS && !lsFitsTrailing;

            mainArea.style.gridTemplateColumns = '1fr';
            mainArea.style.gridTemplateRows = lsNeedsBanner ? 'minmax(0,22%) 1fr' : '1fr';
            mainArea.style.gridTemplateAreas = lsNeedsBanner ? '"lsbanner" "cards"' : '"cards"';
            mainArea.style.gap = '3mm';

            // Banner lifestyle row (when grid is perfect or ls won't fit trailing)
            if (lsNeedsBanner) {
                const banner = el('div', `grid-area:lsbanner;display:grid;gap:2mm;min-height:0;overflow:hidden;grid-template-columns:repeat(${lsCount},1fr);`);
                for (let i = 0; i < lsCount; i++) banner.appendChild(makeLsCell(lsSelected[i] || i));
                mainArea.appendChild(banner);
            }

            // Cards grid
            const cardGrid = el('div', `grid-area:cards;display:grid;gap:2mm;min-height:0;overflow:hidden;grid-template-columns:repeat(${cols},1fr);grid-auto-rows:1fr;`);
            products.forEach(prod => cardGrid.appendChild(makeProductCard(prod)));

            // Trailing lifestyle cells (fill empty slots in last row)
            if (lsFitsTrailing) {
                for (let i = 0; i < lsCount && i < emptySlots; i++) {
                    const cell = makeLsCell(lsSelected[i] || i);
                    cell.style.borderRadius = '2mm';
                    cardGrid.appendChild(cell);
                }
                // Fill any remaining empty slots with blank spacers
                for (let i = lsCount; i < emptySlots; i++) {
                    cardGrid.appendChild(el('div', 'min-height:0;'));
                }
            }

            mainArea.appendChild(cardGrid);

        // ── COLUMN MODE ──────────────────────────────────────────────────────
        } else {
            // Layout: [ls-col] [product-cols] — lifestyle as left column, or top banner, or none
            if (anyLS) {
                mainArea.style.gridTemplateColumns = 'minmax(0,28%) 1fr';
                mainArea.style.gridTemplateRows = '1fr';
                mainArea.style.gridTemplateAreas = '"ls pd"';
                mainArea.style.gap = '3mm';

                const lsColWrap = el('div', 'grid-area:ls;display:grid;gap:1.5mm;min-height:0;overflow:hidden;');
                lsColWrap.style.gridTemplateRows = `repeat(${lsCount}, 1fr)`;
                for (let i = 0; i < lsCount; i++) lsColWrap.appendChild(makeLsCell(lsSelected[i] || i));
                mainArea.appendChild(lsColWrap);

                const pdWrap = el('div', 'grid-area:pd;min-height:0;overflow:hidden;display:grid;');
                pdWrap.style.gridTemplateColumns = products.map(() => '1fr').join(' ');
                pdWrap.style.gap = '3mm';
                productPanels.forEach(({ panel }) => pdWrap.appendChild(panel));
                mainArea.appendChild(pdWrap);
            } else {
                mainArea.style.gridTemplateColumns = '1fr';
                mainArea.style.gridTemplateRows = '1fr';
                mainArea.style.gridTemplateAreas = '"pd"';
                mainArea.style.gap = '0';
                const pdWrap = el('div', 'grid-area:pd;min-height:0;overflow:hidden;display:grid;');
                pdWrap.style.gridTemplateColumns = products.map(() => '1fr').join(' ');
                pdWrap.style.gap = '3mm';
                productPanels.forEach(({ panel }) => pdWrap.appendChild(panel));
                mainArea.appendChild(pdWrap);
            }

            // Render each column panel's internal layout
            productPanels.forEach(({ panel, descEl, imgGrid, prod }, idx) => {
                const s = imgStates[idx];
                const anyImgs = s.imgVisible > 0 && prod.productImgs && prod.productImgs.length > 0;
                const showDesc = descVisible;

                imgGrid.innerHTML = '';
                descEl.style.display = showDesc ? '' : 'none';

                if (anyImgs) {
                    const count = Math.min(s.imgVisible, prod.productImgs.length);
                    imgGrid.style.display = 'grid';
                    imgGrid.style.gridTemplateColumns = count >= 2 ? '1fr 1fr' : '1fr';
                    imgGrid.style.gridTemplateRows = count >= 3 ? '1fr 1fr' : '1fr';
                    for (let i = 0; i < count; i++) {
                        const z = makeSlot(prod.productImgs, i, count, 'product');
                        z.style.cssText += 'min-height:0;border-radius:1.5mm;border:none;width:100%;height:100%;';
                        imgGrid.appendChild(z);
                    }
                } else {
                    imgGrid.style.display = 'none';
                }

                const rows = [];
                rows.push({ area: 'nm', size: 'auto' });
                if (showDesc) rows.push({ area: 'tx', size: '1fr' });
                if (anyImgs) rows.push({ area: 'im', size: !showDesc ? '1fr' : (s.imgVisible >= 2 ? 'minmax(0,42%)' : 'minmax(0,30%)') });
                if (!showDesc && !anyImgs) rows.push({ area: 'tx', size: '1fr' });

                panel.style.gridTemplateAreas = rows.map(r => `"${r.area}"`).join(' ');
                panel.style.gridTemplateRows = rows.map(r => r.size).join(' ');
                panel.style.gridTemplateColumns = '1fr';
            });

            // Equalise image heights
            requestAnimationFrame(() => {
                const vg = productPanels.map(pp => pp.imgGrid).filter(g => g.style.display !== 'none');
                if (vg.length > 1) {
                    vg.forEach(g => { g.style.height = ''; g.style.maxHeight = ''; });
                    const minH = Math.min(...vg.map(g => g.getBoundingClientRect().height));
                    if (minH > 0) vg.forEach(g => { g.style.height = minH + 'px'; g.style.maxHeight = minH + 'px'; });
                }
            });
        }
    }

    // ── Editor controls ──────────────────────────────────────────────────────
    const editor = el('div', null);
    editor.className = 'pg-editor';

    if (!useGridMode) {
        const descSec = el('div', null);
        descSec.className = 'pg-editor-section';
        descSec.appendChild(el('span', 'font-size:1.6mm;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;margin-right:1mm;', 'Desc'));
        const descBtn = el('button', null, descVisible ? 'Hide' : 'Show');
        descBtn.className = 'pg-ed-btn' + (descVisible ? ' active' : '');
        descBtn.onclick = () => { descVisible = !descVisible; descBtn.textContent = descVisible ? 'Hide' : 'Show'; descBtn.classList.toggle('active', descVisible); renderGrid(); };
        descSec.appendChild(descBtn);
        editor.appendChild(descSec);
    }

    // Lifestyle: count buttons (0/1/2/3) + per-slot image pickers
    if (allLifestyleImgs.length > 0) {
        const maxL = Math.min(allLifestyleImgs.length, 3);
        const lsSec = el('div', null);
        lsSec.className = 'pg-editor-section';
        lsSec.style.flexDirection = 'column';
        lsSec.style.alignItems = 'flex-start';
        lsSec.style.gap = '2mm';

        // Count row
        const countRow = el('div', 'display:flex;align-items:center;gap:1.5mm;flex-wrap:wrap;');
        countRow.appendChild(el('span', 'font-size:1.6mm;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;margin-right:1mm;white-space:nowrap;', 'Lifestyle'));
        const countBtns = [];
        for (let i = 0; i <= maxL; i++) {
            const btn = el('button', null, String(i));
            btn.className = 'pg-ed-btn' + (i === lsVisible ? ' active' : '');
            btn.onclick = () => {
                lsVisible = i;
                countBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderSlotPickers();
                renderGrid();
            };
            countBtns.push(btn);
            countRow.appendChild(btn);
        }
        lsSec.appendChild(countRow);

        // Per-slot image pickers — shown when lsVisible > 0
        const slotPickersWrap = el('div', 'display:flex;flex-direction:column;gap:1.5mm;width:100%;');
        function renderSlotPickers() {
            slotPickersWrap.innerHTML = '';
            if (lsVisible === 0 || allLifestyleImgs.length <= 1) return;
            for (let slot = 0; slot < lsVisible; slot++) {
                const row = el('div', 'display:flex;align-items:center;gap:1mm;flex-wrap:wrap;');

function extractProductDataFromDoc(doc, pageUrl) {
    const productNameEl = doc.querySelector('#PageProductID');
    const h2El = doc.querySelector('h2');
    const productCode = productNameEl ? productNameEl.textContent.trim() : pageUrl.split('/').pop();
    const subtitle = h2El ? h2El.textContent.trim() : '';
    const descEl = doc.querySelector('.mt-1.mb-5.pb-5');
    if (descEl) cleanDescription(descEl);
    const descHTML = descEl ? descEl.innerHTML : '';
    const carouselImages = doc.querySelectorAll('.owl-carousel img');
    const allImages = Array.from(doc.querySelectorAll('img'));
    const mainImage = allImages.find(img => img.src.includes(pageUrl.split('/').pop())) || allImages.find(img => img.src.includes('QA2-1.png'));
    const carouselImgs = Array.from(carouselImages);
    let { lifestyle, product } = classifyImages(carouselImgs, productCode);
    if (product.length === 0 && mainImage) product.push(mainImage.src);
    const tags = Array.from(doc.querySelectorAll('.row .Tag')).map(t => (t.title || t.textContent).trim()).filter(Boolean);
    let specTable = null;
    const specHeading = Array.from(doc.querySelectorAll('h2')).find(h => h.textContent.includes('TECHNICAL SPECIFICATION'));
    if (specHeading && specHeading.nextElementSibling) {
        const tbl = specHeading.nextElementSibling.querySelector('table');
        if (tbl) {
            cleanTechnicalSpecificationTable(tbl);
            const rows = Array.from(tbl.querySelectorAll('tr'));
            let currentHeaderRow = null;
            let allTBC = true;
            rows.forEach(row => {
                const cells = Array.from(row.cells).map(c => c.textContent.trim());
                const isShipping = cells.some(c => c.toUpperCase().includes('SHIPPING'));
                const isDownloads = cells.some(c => c.toUpperCase().includes('DOWNLOADS'));
                if (isShipping || isDownloads) { row.remove(); return; }
                if (cells.some(c => c === 'TBC' || c === 'VARIABLE' || /https?:\/\//.test(c)) || row.querySelector('a')) {
                    row.remove();
                } else {
                    if (currentHeaderRow && allTBC) currentHeaderRow.remove();
                    currentHeaderRow = row;
                    allTBC = true;
                    if (!cells.some(c => c === 'TBC' || c === 'VARIABLE')) allTBC = false;
                }
            });
            const nonEmpty = Array.from(tbl.querySelectorAll('tr')).filter(r => Array.from(r.cells).some(c => c.textContent.trim()));
            if (nonEmpty.length > 1) specTable = tbl;
        }
    }
    return { productCode, subtitle, descHTML, productImgs: product, lifestyleImgs: lifestyle, specTable, tags };
}

function cleanDescription(desc) {
    desc.querySelectorAll('table,button').forEach(e => e.remove());
    desc.querySelectorAll('img,video,iframe').forEach(e => { if (e.parentElement) e.parentElement.remove(); else e.remove(); });
    desc.querySelectorAll('.row, .alert, .LidTypes, .clearfix').forEach(e => e.remove());
    desc.querySelectorAll('a').forEach(a => { if (!/^\/Product\/Details\/[A-Za-z0-9\-]+$/.test(a.getAttribute('href'))) a.remove(); });
    const parser = new DOMParser();
    const d = parser.parseFromString(desc.innerHTML, 'text/html');
    d.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href') || '';
        const txt = a.textContent.trim();
        if (/^\/Product\/Details\/[A-Za-z0-9\-]+$/.test(href) && /^[A-Za-z0-9\-]+$/.test(txt)) a.replaceWith(document.createTextNode(txt));
        else a.remove();
    });
    desc.innerHTML = d.body.innerHTML.split('. ').filter(s => !(s.includes('see') && s.includes('for details'))).join('. ');
}
function cleanTechnicalSpecificationTable(table) {
    Array.from(table.querySelectorAll('tr')).forEach(row => {
        if (row.querySelectorAll('button').length) { row.remove(); return; }
        row.querySelectorAll('img').forEach(img => { img.querySelectorAll && row.querySelectorAll('strong').forEach(s => s.remove()); img.remove(); });
        if (Array.from(row.cells).some(c => c.textContent.trim() === '')) row.remove();
    });
}

function parseLine(line) {
    const mergeMatch = line.match(/^MERGE\s+(\w+)\s*-\s*(.+)$/i);
    if (mergeMatch) return { type: 'merge', mergeId: mergeMatch[1].toUpperCase(), url: mergeMatch[2].trim() };
    if (line.startsWith('COVER')) return { type: 'cover', text: line.split(' - ')[1] || line };
    if (line.startsWith('CONTENTS')) return { type: 'contents', title: line.replace(/^CONTENTS\s*-?\s*/i, '').trim() || line };
    if (line.startsWith('BACK COVER')) return { type: 'backCover' };
    if (line === 'BLANK') return { type: 'blank' };
    if (line.startsWith('http')) return { type: 'url', url: line };
    return null;
}

async function fetchCdnUrls() {
    const lines = document.getElementById('pageUrls').value.split('\n');
    const pagesContainer = document.getElementById('pagesContainer');
    const statusContainer = document.getElementById('statusContainer');
    const createButton = document.getElementById('createButton');
    if (!lines[0] || !lines[0].trim()) { showToast('No URLs provided', 'warning'); return; }
    pagesContainer.innerHTML = '';
    statusContainer.style.display = 'flex';
    const spinner = document.querySelector('.spinner');
    if (spinner) spinner.style.display = '';
    createButton.disabled = true;
    try {
        const pageOrder = [];
        const sections = [];
        let currentSection = '';
        let hasCover = false;
        const pendingMerges = {};
        const processedLines = [];

        for (let i = 0; i < lines.length; i++) {
            const raw = lines[i].trim();
            if (!raw) continue;
            const parsed = parseLine(raw);
            if (parsed) processedLines.push({ ...parsed, rawLine: raw });
        }

        const urlsToFetch = [];
        processedLines.forEach(p => {
            if (p.type === 'url' || p.type === 'merge') urlsToFetch.push(p.url);
        });

        const docCache = new Map();
        // Track which merge groups are complete so we can stream them
        const mergeUrlSets = {}; // mergeId -> Set of urls
        processedLines.forEach(p => {
            if (p.type === 'merge') {
                if (!mergeUrlSets[p.mergeId]) mergeUrlSets[p.mergeId] = new Set();
                mergeUrlSets[p.mergeId].add(p.url);
            }
        });
        const renderedItems = new Set(); // track already-streamed items

        function tryStreamPage(url) {
            // Find the processedLine for this url and render if ready
            for (const p of processedLines) {
                if (p.type === 'url' && p.url === url && !renderedItems.has(url)) {
                    const doc = docCache.get(url);
                    if (!doc) { renderedItems.add(url); return; }
                    const pdata = extractProductDataFromDoc(doc, url);
                    const wrapper = el('div', null);
                    wrapper.className = 'page-wrapper-outer';
                    const page = document.createElement('div');
                    page.classList.add('a4-page');
                    page.dataset.productName = pdata.productCode;
                    page.dataset.streamUrl = url;
                    const inner2 = el('div', null);
                    inner2.className = 'fa-inner';
                    page.appendChild(inner2);
                    let specVis2 = {};
                    let renderedSpecTable2 = null;
                    if (pdata.specTable) {
                        const extracted2 = extractSpecDataFromTable(pdata.specTable);
                        extracted2.rows.forEach(r => { specVis2[r.label] = !isSpecHidden(r.label); });
                        renderedSpecTable2 = buildSingleSpecTable(pdata.specTable, specVis2);
                    }
                    const lr2 = buildLayout(inner2, pdata.productCode, pdata.subtitle, pdata.descHTML, pdata.productImgs, pdata.specTable, pdata.tags, pdata.lifestyleImgs);
                    if (pdata.specTable && renderedSpecTable2) {
                        buildCategoryDropdown(wrapper, specVis2, renderedSpecTable2, null, false, lr2.specZoneEl);
                    }
                    wrapper.appendChild(page);
                    pagesContainer.appendChild(wrapper);
                    renderedItems.add(url);
                    updatePageNavigator();
                }
            }
        }

        function tryStreamMerge(mergeId) {
            if (renderedItems.has('merge:' + mergeId)) return;
            const needed = mergeUrlSets[mergeId];
            if (!needed) return;
            for (const u of needed) { if (!docCache.has(u)) return; } // not all fetched yet
            // All ready — build merged page
            const mgLines = processedLines.filter(p => p.type === 'merge' && p.mergeId === mergeId);
            const pdatas2 = mgLines.map(p => {
                const doc2 = docCache.get(p.url);
                return doc2 ? extractProductDataFromDoc(doc2, p.url) : null;
            }).filter(Boolean);
            if (!pdatas2.length) { renderedItems.add('merge:' + mergeId); return; }
            const specDataArray2 = pdatas2.map(d => d.specTable ? extractSpecDataFromTable(d.specTable) : { categories: [], rows: [] });
            const mergedSpec2 = mergeSpecData(specDataArray2);
            const wrapper2 = el('div', null);
            wrapper2.className = 'page-wrapper-outer';
            const page2 = document.createElement('div');
            page2.classList.add('a4-page');
            page2.dataset.productName = pdatas2.map(p => p.productCode).join(' + ');
            page2.dataset.streamMergeId = mergeId;
            const inner3 = el('div', null);
            inner3.className = 'fa-inner';
            page2.appendChild(inner3);
            const products2 = pdatas2.map(d => ({
                productCode: d.productCode, subtitle: d.subtitle, descHTML: d.descHTML,
                productImgs: d.productImgs, lifestyleImgs: d.lifestyleImgs, tags: d.tags
            }));
            const dummySpec2 = mergedSpec2.rows.length > 0 ? { _isMerged: true } : null;
            const { specVisMap: svm2, builtSpecTable: bst2, specZoneEl: sze2 } = buildMergedLayout(inner3, products2, dummySpec2, mergedSpec2);
            if (mergedSpec2.rows.length > 0 && bst2) {
                buildCategoryDropdown(wrapper2, svm2, bst2, mergedSpec2, true, sze2);
            }
            wrapper2.appendChild(page2);
            pagesContainer.appendChild(wrapper2);
            renderedItems.add('merge:' + mergeId);
            updatePageNavigator();
        }

        for (let i = 0; i < urlsToFetch.length; i++) {
            const url = urlsToFetch[i];
            if (docCache.has(url)) continue;
            updateStatus(`Fetching ${i + 1}/${urlsToFetch.length}: ${url.split('/').pop()}`);
            updateProgress((i / urlsToFetch.length) * 100);
            if (i > 0) await delay(600);
            try {
                const data = await fetchWithRetry(url, 10);
                const doc = new DOMParser().parseFromString(data.contents, 'text/html');
                docCache.set(url, doc);
            } catch (err) {
                showToast(`Skipped: ${url.split('/').pop()} - ${err.message}`, 'error');
                docCache.set(url, null);
            }
            // Stream: render solo page immediately or check if a merge group is now complete
            tryStreamPage(url);
            for (const mid of Object.keys(mergeUrlSets)) tryStreamMerge(mid);
        }

        const mergeGroups = {};
        const mergeOrder = [];

        for (let i = 0; i < processedLines.length; i++) {
            const parsed = processedLines[i];
            if (parsed.type === 'cover') {
                hasCover = true;
                pageOrder.push({ type: 'cover', page: createCoverPage(parsed.text), section: '' });
            } else if (parsed.type === 'contents') {
                currentSection = parsed.title;
                sections.push({ title: currentSection, entries: [] });
                const sep = createContentsPage(currentSection, [], []);
                sep.dataset.sectionSeparator = 'true';
                sep.dataset.sectionTitle = currentSection;
                sep.style.display = 'none';
                pageOrder.push({ type: 'sectionSeparator', page: sep, section: currentSection });
            } else if (parsed.type === 'backCover') {
                pageOrder.push({ type: 'backCover', page: createBackCoverPage(), section: '' });
            } else if (parsed.type === 'blank') {
                const bp = document.createElement('div');
                bp.classList.add('a4-page');
                addPageControls(bp);
                pageOrder.push({ type: 'blank', page: bp, section: '' });
            } else if (parsed.type === 'merge') {
                const mid = parsed.mergeId;
                if (!mergeGroups[mid]) { mergeGroups[mid] = []; mergeOrder.push(mid); }
                const doc = docCache.get(parsed.url);
                if (doc) {
                    const pdata = extractProductDataFromDoc(doc, parsed.url);
                    mergeGroups[mid].push({ pdata, url: parsed.url, section: currentSection, lineIdx: i });
                }
                const existingOrder = pageOrder.find(p => p.type === 'mergeGroup' && p.mergeId === mid);
                if (!existingOrder) {
                    pageOrder.push({ type: 'mergeGroup', mergeId: mid, section: currentSection, _entryKey: mid });
                }
            } else if (parsed.type === 'url') {
                const doc = docCache.get(parsed.url);
                if (doc) {
                    const pdata = extractProductDataFromDoc(doc, parsed.url);
                    const entryKey = parsed.url;
                    const displayName = pdata.productCode;
                    if (sections.length) sections[sections.length - 1].entries.push({ key: entryKey, displayName });
                    pageOrder.push({ type: 'url', section: currentSection, _entryKey: entryKey, _productName: pdata.productCode, _pdata: pdata });
                }
            }
        }

        pagesContainer.innerHTML = '';

        let insidePageNum = 1;
        let filteredPageOrder = [];
        let backCoverItem = null;
        for (const item of pageOrder) {
            if (item.type === 'backCover') {
                backCoverItem = item;
            } else {
                filteredPageOrder.push(item);
            }
        }
        filteredPageOrder.forEach(item => {
            if (item.type === 'url' || item.type === 'mergeGroup') {
                item._pageNum = insidePageNum++;
            }
        });

        sections.forEach(sec => {
            let first = true;
            filteredPageOrder.forEach(item => {
                if ((item.type === 'url' || item.type === 'mergeGroup') && item.section === sec.title && first) {
                    sec.startPageNum = item._pageNum;
                    first = false;
                }
            });
        });

        filteredPageOrder.forEach(item => {
            if (item.type === 'url') {
                for (const sec of sections) {
                    const entry = sec.entries.find(e => e.key === item._entryKey);
                    if (entry) { entry.pageNum = item._pageNum; break; }
                }
            } else if (item.type === 'mergeGroup') {
                const mg = mergeGroups[item.mergeId];
                if (mg && mg.length > 0) {
                    const sec = mg[0].section;
                    for (const s of sections) {
                        if (s.title === sec) {
                            const displayName = mg.map(g => g.pdata.productCode).join(' + ');
                            const existingEntry = s.entries.find(e => e.key === item.mergeId);
                            if (existingEntry) {
                                existingEntry.pageNum = item._pageNum;
                                existingEntry.displayName = displayName;
                            } else {
                                s.entries.push({ key: item.mergeId, displayName, pageNum: item._pageNum });
                            }
                            break;
                        }
                    }
                }
            }
        });

        let masterContentsPages = [];
        if (hasCover && sections.length > 0) {
            masterContentsPages = createMasterContentsPages(sections, filteredPageOrder);
            masterContentsPages.forEach(p => p.dataset.pageType = 'contents');
        }

        let coverAdded = false;
        filteredPageOrder.forEach(item => {
            if (!item.page && item.type !== 'url' && item.type !== 'mergeGroup') return;
            if (item.type === 'url') {
                const wrapper = el('div', null);
                wrapper.className = 'page-wrapper-outer';
                const page = document.createElement('div');
                page.classList.add('a4-page');
                page.dataset.productName = item._productName || '';
                const inner = el('div', null);
                inner.className = 'fa-inner';
                page.appendChild(inner);
                const pdata = item._pdata;
                let specVis = {};
                let renderedSpecTable = null;
                if (pdata.specTable) {
                    const extracted = extractSpecDataFromTable(pdata.specTable);
                    extracted.rows.forEach(r => { specVis[r.label] = !isSpecHidden(r.label); });
                    renderedSpecTable = buildSingleSpecTable(pdata.specTable, specVis);
                }
                const layoutResult = buildLayout(inner, pdata.productCode, pdata.subtitle, pdata.descHTML, pdata.productImgs, pdata.specTable, pdata.tags, pdata.lifestyleImgs);
                if (pdata.specTable && renderedSpecTable) {
                    buildCategoryDropdown(wrapper, specVis, renderedSpecTable, null, false, layoutResult.specZoneEl);
                }
                wrapper.appendChild(page);
                item._page = page;
                pagesContainer.appendChild(wrapper);
            } else if (item.type === 'mergeGroup') {
                const mg = mergeGroups[item.mergeId];
                if (mg && mg.length > 0) {
                    const pdatas = mg.map(g => g.pdata);
                    const codes = pdatas.map(p => p.productCode);
                    const specDataArray = pdatas.map(d => d.specTable ? extractSpecDataFromTable(d.specTable) : { categories: [], rows: [] });
                    const mergedSpec = mergeSpecData(specDataArray);
                    const wrapper = el('div', null);
                    wrapper.className = 'page-wrapper-outer';
                    const page = document.createElement('div');
                    page.classList.add('a4-page');
                    page.dataset.productName = codes.join(' + ');
                    const inner = el('div', null);
                    inner.className = 'fa-inner';
                    page.appendChild(inner);
                    const products = pdatas.map(d => ({
                        productCode: d.productCode,
                        subtitle: d.subtitle,
                        descHTML: d.descHTML,
                        productImgs: d.productImgs,
                        lifestyleImgs: d.lifestyleImgs,
                        tags: d.tags
                    }));
                    let dummySpecTable = mergedSpec.rows.length > 0 ? { _isMerged: true } : null;
                    const { specVisMap, builtSpecTable, specZoneEl } = buildMergedLayout(inner, products, dummySpecTable, mergedSpec);
                    if (mergedSpec.rows.length > 0 && builtSpecTable) {
                        buildCategoryDropdown(wrapper, specVisMap, builtSpecTable, mergedSpec, true, specZoneEl);
                    }
                    wrapper.appendChild(page);
                    item._page = page;
                    pagesContainer.appendChild(wrapper);
                }
            } else if (item.page) {
                pagesContainer.appendChild(item.page);
                if (item.type === 'cover' && !coverAdded) {
                    coverAdded = true;
                    const insideBlank = document.createElement('div');
                    insideBlank.classList.add('a4-page');
                    addPageControls(insideBlank);
                    pagesContainer.appendChild(insideBlank);
                    masterContentsPages.forEach(mcp => pagesContainer.appendChild(mcp));
                }
            }
        });

        if (hasCover) {
            let currentCount = pagesContainer.children.length;
            let totalWithBackCover = currentCount + (backCoverItem ? 1 : 1);
            let blanksNeeded = (4 - (totalWithBackCover % 4)) % 4;
            for (let i = 0; i < blanksNeeded; i++) {
                const padBlank = document.createElement('div');
                padBlank.classList.add('a4-page');
                padBlank.dataset.padBlank = '1';
                addPageControls(padBlank);
                pagesContainer.appendChild(padBlank);
            }
        }
        if (backCoverItem) {
            pagesContainer.appendChild(backCoverItem.page);
        } else if (hasCover) {
            pagesContainer.appendChild(createBackCoverPage());
        }

        if (hasCover) {
            const allPages = Array.from(pagesContainer.querySelectorAll('.a4-page:not([data-section-separator])'));
            let visibleIdx = 0;
            allPages.forEach(page => {
                const matchingItem = filteredPageOrder.find(it => it._page === page || it.page === page);
                if (!matchingItem || matchingItem.type === 'cover' || matchingItem.type === 'blank') {
                    visibleIdx++;
                    return;
                }
                const pgNum = matchingItem._pageNum;
                const section = matchingItem.section || '';
                if (!pgNum) { visibleIdx++; return; }
                const isRight = (visibleIdx % 2 === 0);
                const footer = el('div', null);
                footer.className = 'pg-footer';
                const leftEl = el('span', null, isRight ? '' : section);
                leftEl.className = 'pg-footer-left';
                const centerEl = el('span', null, String(pgNum));
                centerEl.className = 'pg-footer-center';
                const rightEl = el('span', null, isRight ? section : '');
                rightEl.className = 'pg-footer-right';
                footer.appendChild(leftEl);
                footer.appendChild(centerEl);
                footer.appendChild(rightEl);
                page.appendChild(footer);
                visibleIdx++;
            });
        }
        updatePageNavigator();
        showToast('Brochure created', 'success');
    } catch (e) { console.error(e); showToast('Error creating brochure', 'error'); }
    finally {
        statusContainer.style.display = 'none';
        createButton.disabled = false;
        updateStatus('Done');
        if (spinner) spinner.style.display = 'none';
    }
}
function updateStatus(msg) { document.getElementById('statusText').textContent = msg; }
function updateProgress(pct) { document.getElementById('progressBar').style.width = `${pct}%`; }
function hideProgress() { document.getElementById('progressBar').style.width = '0%'; }
function updatePageNavigator() {
    const nav = document.getElementById('pageNavigator');
    const pages = Array.from(document.querySelectorAll('.a4-page'));
    if (!pages.length) { nav.style.display = 'none'; return; }
    nav.innerHTML = '';
    nav.style.display = 'flex';
    pages.forEach((page, i) => {
        const dot = document.createElement('div');
        dot.className = 'page-navigator-dot';
        const tip = document.createElement('div');
        tip.className = 'tooltip';
        tip.textContent = page.dataset.productName || `Page ${i+1}`;
        dot.appendChild(tip);
        dot.addEventListener('click', () => page.scrollIntoView({ behavior:'smooth' }));
        nav.appendChild(dot);
    });
    const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                const idx = pages.indexOf(e.target);
                nav.querySelectorAll('.page-navigator-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
            }
        });
    }, { threshold: 0.5 });
    pages.forEach(p => obs.observe(p));
}
function printPage() {
    const pages = document.querySelectorAll('.a4-page');
    if (pages.length) {
        const last = pages[pages.length-1];
        const orig = last.style.pageBreakAfter;
        last.style.pageBreakAfter = 'auto';
        window.print();
        setTimeout(() => { last.style.pageBreakAfter = orig; }, 1000);
    } else { window.print(); }
}
async function exportSellSheets() {
    const pages = Array.from(document.querySelectorAll('.a4-page'));
    const products = pages.filter(p => {
        const name = p.dataset.productName || "";
        return name && !name.startsWith("Cover") && !name.startsWith("Contents") && name !== "Back Cover" && !p.dataset.padBlank && p.querySelector('.fa-inner');
    });
    if (!products.length) { showToast('No product pages found', 'warning'); return; }
    let abortExport = false;
    const escapeListener = (e) => {
        if (e.key === "Escape") {
            abortExport = true;
            showToast('Stopping export loop...', 'warning');
        }
    };
    window.addEventListener('keydown', escapeListener);
    const originalTitle = document.title;
    const date = new Date().toLocaleDateString('en-GB', {month:'short', year:'2-digit'}).toUpperCase().replace(' ', '-');
    document.body.classList.add('sell-sheet-mode');
    for (const page of products) {
        if (abortExport) break;
        const prodName = page.dataset.productName || "Product";
        document.title = `${prodName} - SELL SHEET - ${date}`;
        page.classList.add('is-printing');
        window.print();
        page.classList.remove('is-printing');
        await delay(500);
    }
    window.removeEventListener('keydown', escapeListener);
    document.body.classList.remove('sell-sheet-mode');
    document.title = originalTitle;
    showToast(abortExport ? 'Export Stopped' : 'Export complete', abortExport ? 'info' : 'success');
}
function clearAll() {
    if (!confirm('Clear all data?')) return;
    document.getElementById('pageUrls').value = '';
    document.getElementById('urlInput').value = '';
    document.getElementById('pagesContainer').innerHTML = '';
    document.getElementById('results').innerHTML = '';
    visitedLinks.clear(); processedUrls.clear();
    updatePageNavigator();
    showToast('All data cleared', 'info');
}
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pageUrls').addEventListener('input', function() {
        document.getElementById('createButton').disabled = !this.value.trim();
    });
    updatePageNavigator();
});
</script>
